<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Notes AI — App</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  async function initFirebase() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) throw new Error('Config fetch failed');
      const { firebase } = await res.json();
      const app = initializeApp(firebase);
      const db = getDatabase(app);
      const auth = getAuth(app);
      window._db = db; window._auth = auth;
      window._ref = ref; window._push = push; window._remove = remove;
      window._update = update; window._get = get;
      window._signOut = () => signOut(auth);

      onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        window._currentUser = user;
        const initials = (user.displayName || user.email || '?')[0].toUpperCase();
        document.getElementById('user-av').textContent = initials;
        document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
        loadAIMemory();
      });

      const notesRef = ref(db, 'notes');
      onValue(notesRef, snap => {
        const data = snap.val();
        window.allNotes = data
          ? Object.entries(data).map(([fbKey,v]) => ({fbKey,...v})).sort((a,b) => b.id - a.id)
          : [];
        renderApp();
      });
    } catch(err) {
      console.error(err);
      window.location.href = 'auth.html';
    }
  }
  initFirebase();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050810;--bg2:#07091a;--surface:#0c1022;--surface2:#10162e;--surface3:#151e3f;
  --border:rgba(59,130,246,0.1);--border-h:rgba(59,130,246,0.28);
  --text:#7a9ac7;--text-b:#ddeeff;--text-m:#2e4470;
  --a:#3b82f6;--a2:#60a5fa;--ag:rgba(59,130,246,0.13);--ag2:rgba(59,130,246,0.06);
  --cyan:#22d3ee;--red:#f87171;--green:#4ade80;--purple:#a78bfa;
  --r:16px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);top:-250px;right:-150px;animation:orb 14s ease-in-out infinite alternate}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(34,211,238,0.04) 0%,transparent 70%);bottom:-150px;left:-100px;animation:orb 18s ease-in-out infinite alternate-reverse}
@keyframes orb{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,-30px) scale(1.1)}}

/* INSTALL STRIP */
#install-strip{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(90deg,#0d1f4e,#0c1022);border-bottom:1px solid var(--border-h);padding:10px 16px;align-items:center;justify-content:space-between;gap:10px}
#install-strip.show{display:flex}
.s-left{display:flex;align-items:center;gap:10px}
.s-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-title{font-size:13px;font-weight:700;color:var(--text-b)}
.s-sub{font-size:11px;color:var(--text-m);margin-top:1px}
.s-btns{display:flex;gap:6px;flex-shrink:0}
.s-dismiss{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-m);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;font-family:'Outfit',sans-serif}
.s-install{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}

/* APP NAV */
.app-nav{position:relative;z-index:50;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;gap:10px;background:rgba(5,8,16,0.94);backdrop-filter:blur(28px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--text-b);letter-spacing:-0.5px;text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 14px rgba(59,130,246,0.4);animation:lgo 3s ease-in-out infinite}
@keyframes lgo{0%,100%{box-shadow:0 0 12px rgba(59,130,246,0.4)}50%{box-shadow:0 0 26px rgba(59,130,246,0.65)}}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;flex:1;max-width:280px;transition:all 0.2s}
.search-wrap:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.search-wrap svg{color:var(--text-m);flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;color:var(--text-b);font-family:'Outfit',sans-serif;font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text-m)}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-b);cursor:pointer;transition:all 0.2s;flex-shrink:0}
.user-pill:hover{border-color:var(--border-h)}
.user-avatar{width:22px;height:22px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}

/* LAYOUT */
.app-body{flex:1;display:grid;grid-template-columns:320px 1fr;min-height:0;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;min-height:0}
.tab-switch{display:flex;padding:10px 12px;gap:5px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.tab-btn{flex:1;padding:8px;border-radius:var(--rs);border:1px solid transparent;background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.active{background:var(--ag);border-color:var(--border-h);color:var(--a2)}
/* txt-sec scrolls internally, doesn't push buttons out */
.txt-sec,.img-sec{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;overflow-y:auto;min-height:0;scrollbar-width:thin}
.txt-sec::-webkit-scrollbar,.img-sec::-webkit-scrollbar{width:3px}
.txt-sec::-webkit-scrollbar-thumb,.img-sec::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.hidden{display:none!important}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-m);font-family:'JetBrains Mono',monospace;flex-shrink:0}
/* textarea: fixed height, scrolls inside itself — never pushes layout */
textarea.ti{flex:none;height:200px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-b);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;padding:12px 13px;resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%;overflow-y:auto;scrollbar-width:thin}
textarea.ti:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag);background:var(--surface3)}
textarea.ti::placeholder{color:var(--text-m);font-size:11.5px}
.paste-tip{display:flex;align-items:center;gap:8px;background:var(--ag2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);flex-shrink:0}
.paste-tip kbd{background:var(--surface2);border:1px solid var(--border-h);border-radius:5px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--a2)}
.dropzone{flex:1;border:2px dashed var(--border-h);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;background:var(--surface2);min-height:80px}
.dropzone:hover,.dropzone.over{border-color:var(--a);background:var(--ag)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz-ico{font-size:26px;opacity:0.2}
.dz-txt{font-size:12px;color:var(--text-m);text-align:center}
.dz-txt b{color:var(--a2)}
.img-prev{border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);display:none;flex-shrink:0}
.img-prev img{width:100%;max-height:120px;object-fit:cover;display:block}
.img-prev-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface2);font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}
.rm-btn{cursor:pointer;color:var(--red);font-size:11px}

/* AI MEMORY BAR */
.ai-mem-bar{display:none;align-items:center;gap:8px;background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.18);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--purple);flex-shrink:0;margin:0 12px}
.ai-mem-bar.show{display:flex}
.ai-mem-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0;animation:mpulse 2s infinite}
@keyframes mpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(167,139,250,0.5)}70%{opacity:0.7;box-shadow:0 0 0 5px rgba(167,139,250,0)}}

/* VIS TOGGLE */
.vis-toggle-wrap{padding:0 12px;flex-shrink:0;margin-bottom:2px}
.vis-toggle{width:100%;display:flex;align-items:center;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);background:var(--surface2)}
.vis-opt{flex:1;padding:9px 6px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all 0.22s;color:var(--text-m);border:none;background:transparent}
.vis-opt span{font-size:14px;line-height:1}
.vis-opt.active-pub{background:linear-gradient(135deg,rgba(34,211,238,0.18),rgba(59,130,246,0.18));color:var(--cyan)}
.vis-opt.active-priv{background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(99,102,241,0.18));color:var(--purple)}
.vis-opt:hover:not(.active-pub):not(.active-priv){color:var(--text-b);background:var(--ag2)}
.vis-divider{width:1px;background:var(--border);flex-shrink:0}

/* PROC AREA */
.proc-area{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.proc-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 18px rgba(59,130,246,0.3);position:relative;overflow:hidden}
.proc-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%)}
.proc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(59,130,246,0.45)}
.proc-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.lbar{display:none}
.lbar.on{display:block}
.lbar-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.lbar-fill{height:100%;background:linear-gradient(90deg,transparent,var(--a2),var(--cyan),transparent);animation:ls 1.8s ease-in-out infinite}
@keyframes ls{0%{transform:translateX(-100%) scaleX(0.4)}100%{transform:translateX(200%) scaleX(0.4)}}
.lbar-txt{font-size:11px;color:var(--a2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-align:center;margin-top:6px;animation:blk 1s ease-in-out infinite alternate}
@keyframes blk{from{opacity:0.4}to{opacity:1}}

/* MAIN PANEL */
.main-content{overflow-y:auto;padding:16px;background:var(--bg2)}
.main-content::-webkit-scrollbar{width:4px}
.main-content::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fb:hover{border-color:var(--border-h);color:var(--text)}
.fb.on{background:var(--ag);border-color:var(--border-h);color:var(--a2)}
.vis-filter-row{display:flex;gap:6px;margin-bottom:10px}
.vfb{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;color:var(--text-m)}
.vfb:hover{border-color:var(--border-h);color:var(--text-b)}
.vfb.on-all{background:var(--ag);border-color:var(--border-h);color:var(--a2)}
.vfb.on-pub{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.3);color:var(--cyan)}
.vfb.on-priv{background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3);color:var(--purple)}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(220px,28vw,270px),1fr));gap:12px}

/* NOTE CARD */
.anc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);animation:cin 0.3s ease both;cursor:pointer}
@keyframes cin{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none}}
.anc:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.3)}
.nc-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.nc-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cpill{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:3px 9px;border-radius:6px;white-space:nowrap}
.nc-date{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}
.vis-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;padding:3px 8px;border-radius:6px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
.vis-badge.pub{background:rgba(34,211,238,0.1);color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.vis-badge.priv{background:rgba(167,139,250,0.1);color:var(--purple);border-color:rgba(167,139,250,0.2)}
.vis-badge:hover{filter:brightness(1.2);transform:scale(1.04)}
.nc-title{font-size:14px;font-weight:700;color:var(--text-b);line-height:1.3;margin-bottom:7px}
.nc-summary{font-size:12.5px;color:var(--text);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.anc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;margin-top:10px;border-top:1px solid var(--border)}
.anc-src{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px}
.anc-btns{display:flex;gap:5px}
.anc-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.anc-btn:hover{border-color:var(--a);color:var(--a2)}
.anc-btn.edit-b:hover{border-color:rgba(74,222,128,0.4);color:var(--green)}
.anc-btn.del:hover{border-color:rgba(248,113,113,0.4);color:var(--red)}

/* ========================================================
   OVERLAYS
======================================================== */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.78);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
@keyframes min{from{opacity:0;transform:scale(0.93) translateY(20px)}to{opacity:1;transform:none}}

/* ---- VIEW MODAL ---- */
.modal-view{background:var(--surface);border:1px solid var(--border-h);border-radius:20px;width:100%;max-width:700px;max-height:91vh;display:flex;flex-direction:column;animation:min 0.28s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 28px 90px rgba(0,0,0,0.65);position:relative}
.mv-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text-m);z-index:2}
.mv-close:hover{border-color:var(--red);color:var(--red)}
.mv-head{padding:20px 22px 0;flex-shrink:0}
.mv-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.mv-title{font-size:21px;font-weight:900;color:var(--text-b);line-height:1.15;letter-spacing:-0.6px;padding-right:40px;margin-bottom:4px}
.mv-tabs{display:flex;gap:0;padding:0 22px;border-bottom:1px solid var(--border);flex-shrink:0;margin-top:6px}
.mv-tab{padding:10px 16px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;color:var(--text-m);border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.mv-tab.on{color:var(--a2);border-bottom-color:var(--a2)}
.mv-tab:hover:not(.on){color:var(--text-b)}
.mv-body{flex:1;overflow-y:auto;padding:20px 22px 6px}
.mv-body::-webkit-scrollbar{width:4px}
.mv-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* Organized content rendering */
.org-content{font-size:13.5px;line-height:1.85}
.org-h{font-size:14.5px;font-weight:800;color:var(--text-b);margin:20px 0 8px;padding-bottom:7px;border-bottom:1px solid var(--border);letter-spacing:-0.3px}
.org-h:first-child{margin-top:0}
.org-bullet{display:flex;gap:10px;margin:6px 0;color:var(--text-b)}
.org-bullet-dot{color:var(--a2);flex-shrink:0;font-weight:700}
.org-p{margin:7px 0;color:var(--text-b)}

/* Summary & keypoints tab */
.vs{margin-bottom:20px}
.vs-l{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a2);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.vs-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:15px 16px;font-size:13.5px;color:var(--text-b);line-height:1.8}
.kp-list{display:flex;flex-direction:column;gap:8px}
.kp-item{display:flex;gap:10px;font-size:13.5px;color:var(--text-b);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px}
.kp-arrow{color:var(--a2);flex-shrink:0;font-weight:700;margin-top:1px}

.mv-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;flex-wrap:wrap}
.mv-foot-r{display:flex;gap:7px}
.mfbtn{padding:8px 16px;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-m)}
.mfbtn:hover{border-color:var(--border-h);color:var(--text-b)}
.mfbtn.edit{border-color:rgba(74,222,128,0.3);color:var(--green);background:rgba(74,222,128,0.06)}
.mfbtn.edit:hover{border-color:var(--green);background:rgba(74,222,128,0.12);transform:translateY(-1px)}
.mfbtn.del{border-color:rgba(248,113,113,0.2);color:var(--red);background:rgba(248,113,113,0.05)}
.mfbtn.del:hover{border-color:var(--red);background:rgba(248,113,113,0.1)}

/* ---- EDIT MODAL ---- */

.me-close:hover{border-color:var(--red);color:var(--red)}

/* TOAST */

@keyframes tpop{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* CATEGORY COLORS */

::-webkit-scrollbar{width:4px}

@media(max-width:768px){

}

<!-- ===== VIEW OVERLAY ===== -->

<script>
const GROQ_URL='/api/groq';
window.allNotes=window.allNotes||[];
let appFilt='ALL',searchQ='',visFilt='all';
let b64=null,tab='text',noteVisibility='public';
let deferredPrompt=null;
let currentViewKey=null,currentViewNote=null,currentViewTab='notes';
let editingKey=null;
let aiMemory={};

// ============================================================
// AI MEMORY SYSTEM
// ============================================================
async function loadAIMemory(){
  if(!window._db||!window._ref||!window._get)return;
  try{
    const snap=await window._get(window._ref(window._db,'ai_memory'));
    if(snap.exists()){
      aiMemory=snap.val()||{};
      const c=Object.keys(aiMemory).length;
      if(c>0){
        document.getElementById('aiMemBar').classList.add('show');
        document.getElementById('aiMemTxt').textContent=`AI memory: ${c} topic${c>1?'s':''} learned`;
      }
    }
  }catch(e){console.error('AI memory:',e);}
}

async function updateAIMemory(note){
  if(!window._db||!window._update||!window._ref)return;
  try{
    const k=(note.category+'_'+note.title).toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,60);
    const entry={
      title:note.title,category:note.category,
      keyPoints:(note.keyPoints||[]).slice(0,5),
      summary:(note.summary||'').substring(0,200),
      updated:Date.now()
    };
    await window._update(window._ref(window._db,'ai_memory'),{[k]:entry});
    aiMemory[k]=entry;
    const c=Object.keys(aiMemory).length;
    document.getElementById('aiMemBar').classList.add('show');
    document.getElementById('aiMemTxt').textContent=`AI memory: ${c} topic${c>1?'s':''} learned`;
  }catch(e){console.error('AI memory update:',e);}
}

function buildMemoryContext(){
  const entries=Object.values(aiMemory);
  if(!entries.length)return'';
  const sorted=entries.sort((a,b)=>(b.updated||0)-(a.updated||0)).slice(0,20);
  const lines=sorted.map(e=>{
    const kp=(e.keyPoints||[]).join(' | ');
    return`[${e.category}] ${e.title}: ${e.summary||''}${kp?' → '+kp:''}`;
  });
  return`\n\nLEARNED CONTEXT (mga nai-organize mo na dati):\n${lines.join('\n')}`;
}

// ============================================================
// CATEGORY CONFIG
// ============================================================
const knownCats={
  IT:{stripe:'linear-gradient(90deg,#3b82f6,#60a5fa)',pill:'cIT',emoji:'💻'},
  STUDY:{stripe:'linear-gradient(90deg,#22d3ee,#67e8f9)',pill:'cSTUDY',emoji:'📚'},
  FREELANCE:{stripe:'linear-gradient(90deg,#fbbf24,#fde68a)',pill:'cFREELANCE',emoji:'💼'},
  CRYPTO:{stripe:'linear-gradient(90deg,#fb923c,#fed7aa)',pill:'cCRYPTO',emoji:'₿'},
  PERSONAL:{stripe:'linear-gradient(90deg,#818cf8,#c4b5fd)',pill:'cPERSONAL',emoji:'🙋'},
  OTHER:{stripe:'linear-gradient(90deg,#94a3b8,#cbd5e1)',pill:'cOTHER',emoji:'📌'},
};
const dynColors=['linear-gradient(90deg,#34d399,#6ee7b7)','linear-gradient(90deg,#f472b6,#fbcfe8)','linear-gradient(90deg,#a78bfa,#ddd6fe)','linear-gradient(90deg,#fb7185,#fda4af)','linear-gradient(90deg,#38bdf8,#bae6fd)'];
const dynPills=['background:rgba(52,211,153,0.1);color:#34d399','background:rgba(244,114,182,0.1);color:#f472b6','background:rgba(167,139,250,0.1);color:#a78bfa','background:rgba(251,113,133,0.1);color:#fb7185','background:rgba(56,189,248,0.1);color:#38bdf8'];
const catCache={};let colorIdx=0;
function getCatStyle(cat){if(knownCats[cat])return knownCats[cat];if(!catCache[cat]){catCache[cat]={stripe:dynColors[colorIdx%dynColors.length],pillStyle:dynPills[colorIdx%dynPills.length],emoji:'🏷️'};colorIdx++;}return catCache[cat];}
function getCatStripe(cat){return getCatStyle(cat).stripe;}
function getCatPill(cat){const s=getCatStyle(cat);return s.pill?`class="cpill ${s.pill}"`:`class="cpill" style="${s.pillStyle}"`;}
function getCatEmoji(cat){return getCatStyle(cat).emoji||'🏷️';}

// ============================================================
// AI PROMPT — no obvious/redundant content
// ============================================================
function buildSysPrompt(){
  return`Ikaw ay isang expert notes organizer. Mag-return ng PURE JSON ONLY — walang markdown backticks, walang preamble, walang extra text.

STRICT RULES:
1. "title" — REQUIRED. Specific, max 8 words. Base sa actual content. HUWAG gumamit ng "Walang Laman", "Untitled", o generic na title.
2. "summary" — REQUIRED. 1-2 sentences. Actual takeaway. HUWAG gumamit ng "Walang mahalagang impormasyon" o anumang generic na filler. Kahit maikli ang input, mag-summarize pa rin ng honestly.
3. "keyPoints" — REQUIRED. 3-5 items. Bawat item ay 3-7 words lang — concise, specific na insight/fact/action. HINDI buong sentence. Example: "I-save muna bago mag-close" o "Firebase nag-istore ng realtime data".
4. "organizedContent" — yung actual notes, organized. Walang obvious definitions, walang padding.
5. HUWAG mag-hallucinate ng content na wala sa original input.
6. Kahit isang salita lang ang input, mag-provide pa rin ng meaningful na title, summary, at keyPoints base sa context ng note.

JSON FORMAT (STRICT — sundin ito):
{
  "title": "...",
  "category": "IT|STUDY|FREELANCE|CRYPTO|PERSONAL|HEALTH|BUSINESS|DESIGN|FOOD|FINANCE|SCIENCE|ART|OTHER",
  "summary": "...",
  "keyPoints": ["3-7 word insight 1", "3-7 word insight 2", "3-7 word insight 3"],
  "organizedContent": "..."
}${buildMemoryContext()}`;
}

// ============================================================
// INPUT
// ============================================================
function switchTab(t){tab=t;document.getElementById('tbText').classList.toggle('active',t==='text');document.getElementById('tbImg').classList.toggle('active',t==='img');document.getElementById('txtSec').classList.toggle('hidden',t!=='text');document.getElementById('imgSec').classList.toggle('hidden',t!=='img');}
function onFile(e){const f=e.target.files[0];if(f)loadImg(f);}
function loadImg(file){const r=new FileReader();r.onload=ev=>{b64=ev.target.result.split(',')[1];document.getElementById('pimg').src=ev.target.result;document.getElementById('pname').textContent=file.name;document.getElementById('ip').style.display='block';document.getElementById('dz').style.display='none';};r.readAsDataURL(file);}
function clearImg(){b64=null;document.getElementById('ip').style.display='none';document.getElementById('dz').style.display='flex';document.getElementById('fi').value='';}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type.startsWith('image/'))loadImg(f);});
document.addEventListener('paste',e=>{for(const item of e.clipboardData?.items||[]){if(item.type.startsWith('image/')){const f=item.getAsFile();if(!f)continue;switchTab('img');loadImg(f);showToast('📋 Image pasted!');break;}}});
function setVisibility(v){noteVisibility=v;document.getElementById('vOptPub').className='vis-opt'+(v==='public'?' active-pub':'');document.getElementById('vOptPriv').className='vis-opt'+(v==='private'?' active-priv':'');}
function setVisFilt(v,btn){visFilt=v;['vfAll','vfPub','vfPriv'].forEach(id=>document.getElementById(id).className='vfb');if(v==='all')btn.classList.add('on-all');else if(v==='public')btn.classList.add('on-pub');else btn.classList.add('on-priv');renderApp();}

// ============================================================
// PROCESS
// ============================================================
async function process(){
  if(!window._currentUser){showToast('⚠️ Log in first!');return;}
  if(tab==='text'){const t=document.getElementById('txtArea').value.trim();if(!t)return showToast('⚠️ Mag-paste muna ng notes!');await callGroq(t);}
  else{if(!b64)return showToast('⚠️ Mag-upload muna ng image!');await callGroqVision(b64);}
}
function setLoading(on,msg='AI is thinking...'){
  const btn=document.getElementById('pb'),bar=document.getElementById('lbar');
  btn.disabled=on;btn.style.display=on?'none':'flex';bar.classList.toggle('on',on);
  document.getElementById('lbar-txt').textContent=msg;
}
async function callGroq(text){
  setLoading(true,'AI is organizing...');
  try{
    const res=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1800,messages:[{role:'system',content:buildSysPrompt()},{role:'user',content:'I-organize ang notes na ito:\n\n'+text}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.choices[0].message.content.replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    await saveNote(p,'text',text);
    document.getElementById('txtArea').value='';
    showToast(`✦ Saved [${p.category}] · ${noteVisibility==='public'?'🌐 Public':'🔒 Private'}`);
  }catch(err){console.error(err);showToast('⚠️ '+err.message);}
  setLoading(false);
}
async function callGroqVision(imgB64){
  setLoading(true,'AI is reading image...');
  try{
    const res=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:1800,messages:[{role:'user',content:[{type:'image_url',image_url:{url:`data:image/jpeg;base64,${imgB64}`}},{type:'text',text:buildSysPrompt()+'\n\nBasahin at i-organize ang notes sa image.'}]}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.choices[0].message.content.replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    await saveNote(p,'img','[image]');clearImg();
    showToast(`✦ Image saved [${p.category}] · ${noteVisibility==='public'?'🌐 Public':'🔒 Private'}`);
  }catch(err){console.error(err);showToast('⚠️ '+err.message);}
  setLoading(false);
}
async function saveNote(p,source,rawNote=''){
  // Sanitize — ensure correct types regardless of what AI returned
  function ensureStr(v){if(v==null)return'';if(typeof v==='string')return v;if(typeof v==='object')return Object.entries(v).map(([k,val])=>k+': '+val).join('\n');return String(v);}
  function ensureArr(v){if(Array.isArray(v))return v.map(ensureStr).filter(Boolean);if(typeof v==='string'&&v)return[v];return[];}
  const note={
    id:Date.now(),
    title:ensureStr(p.title)||'Untitled',
    category:(ensureStr(p.category)||'OTHER').toUpperCase().replace(/\s+/g,'_'),
    summary:ensureStr(p.summary),
    keyPoints:ensureArr(p.keyPoints),
    organizedContent:ensureStr(p.organizedContent),
    rawNote:rawNote||'',
    source,
    isPublic:noteVisibility==='public',
    date:new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}),
    author:window._currentUser?.displayName||window._currentUser?.email||'Anonymous',
  };
  if(window._db&&window._push&&window._ref){
    try{await window._push(window._ref(window._db,'notes'),note);}
    catch(e){console.error(e);window.allNotes.unshift(note);renderApp();}
  }else{window.allNotes.unshift(note);renderApp();}
  // Reset filters so new note is always visible
  appFilt='ALL'; visFilt='all';
  document.querySelectorAll('#app-filters .fb').forEach(b=>b.classList.remove('on'));
  const allBtn=document.querySelector('#app-filters .fb');if(allBtn)allBtn.classList.add('on');
  ['vfAll','vfPub','vfPriv'].forEach(id=>document.getElementById(id)?.classList.remove('on-all','on-pub','on-priv'));
  document.getElementById('vfAll')?.classList.add('on-all');
  await updateAIMemory(note);
}

// ============================================================
// VISIBILITY TOGGLE
// ============================================================
async function toggleNoteVisibility(fbKey,currentIsPublic,e){
  if(e)e.stopPropagation();
  const newVal=!currentIsPublic;
  if(window._db&&window._update&&window._ref&&fbKey){
    try{await window._update(window._ref(window._db,`notes/${fbKey}`),{isPublic:newVal});showToast(newVal?'🌐 Set to Public':'🔒 Set to Private');}
    catch(err){console.error(err);showToast('⚠️ Update failed');}
  }else{const n=window.allNotes.find(x=>x.fbKey===fbKey);if(n){n.isPublic=newVal;renderApp();}showToast(newVal?'🌐 Set to Public':'🔒 Set to Private');}
}

// ============================================================
// DELETE
// ============================================================
async function delNote(fbKey,id,e){
  if(e)e.stopPropagation();
  if(!confirm('Delete this note?'))return;
  closeView();
  if(window._db&&window._remove&&window._ref&&fbKey){
    try{await window._remove(window._ref(window._db,`notes/${fbKey}`));showToast('🗑️ Deleted');}
    catch(err){console.error(err);}
  }else{window.allNotes=window.allNotes.filter(n=>n.id!==id);renderApp();showToast('🗑️ Deleted');}
}

// ============================================================
// RENDER GRID
// ============================================================
function buildAppFilters(){
  const cats=[...new Set(window.allNotes.map(n=>n.category).filter(Boolean))].sort();
  const wrap=document.getElementById('app-filters');
  wrap.innerHTML=`<button class="fb ${appFilt==='ALL'?'on':''}" onclick="setAppF('ALL',this)">All</button>`;
  cats.forEach(c=>{const btn=document.createElement('button');btn.className='fb'+(appFilt===c?' on':'');btn.textContent=getCatEmoji(c)+' '+c;btn.onclick=function(){setAppF(c,this);};wrap.appendChild(btn);});
}
function renderApp(){
  buildAppFilters();
  const g=document.getElementById('app-grid');if(!g)return;
  let list=appFilt==='ALL'?[...window.allNotes]:window.allNotes.filter(n=>n.category===appFilt);
  if(visFilt==='public')list=list.filter(n=>n.isPublic===true);
  else if(visFilt==='private')list=list.filter(n=>n.isPublic!==true);
  if(searchQ)list=list.filter(n=>[n.title,n.summary,n.organizedContent,n.category].some(s=>(s||'').toLowerCase().includes(searchQ)));
  if(!list.length){g.innerHTML=`<div class="empty"><div class="empty-ico">${searchQ?'🔍':'📋'}</div><div class="empty-t">${searchQ?'Walang nahanap':'No notes here'}</div><div class="empty-s">${searchQ?`No results for "${searchQ}"`:'Wala pang notes dito'}</div></div>`;return;}
  g.innerHTML=list.map(n=>{
    const isPub=n.isPublic===true;
    return`<div class="anc" onclick="openView('${n.fbKey||n.id}')">
      <div class="nc-stripe" style="background:${getCatStripe(n.category)}"></div>
      <div class="nc-top">
        <span ${getCatPill(n.category)}>${getCatEmoji(n.category)} ${n.category}</span>
        <span class="nc-date">${n.date||''}</span>
        <span class="vis-badge ${isPub?'pub':'priv'}" title="Toggle" onclick="toggleNoteVisibility('${n.fbKey||''}',${isPub},event)">${isPub?'🌐 Public':'🔒 Private'}</span>
      </div>
      <div class="nc-title">${esc(displayTitle(n))}</div>
      <div class="nc-summary">${esc(displaySummary(n))}</div>
      <div class="anc-foot">
        <div class="anc-src">${n.source==='img'?'🖼️':'📄'} ${n.source==='img'?'Image':'Text'}${n.author?` · ${esc(n.author)}`:''}</div>
        <div class="anc-btns">
          <button class="anc-btn edit-b" onclick="event.stopPropagation();openEdit('${n.fbKey||n.id}')">✏️ Edit</button>
          <button class="anc-btn del" onclick="event.stopPropagation();delNote('${n.fbKey||''}',${n.id},event)">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
// str() — always returns a safe string regardless of what Firebase stored
function str(v){if(v==null)return'';if(typeof v==='string')return v;if(Array.isArray(v))return v.map(str).join('\n');if(typeof v==='object')return JSON.stringify(v);return String(v);}
function esc(s){var safe=str(s);return safe.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Returns a meaningful title — falls back to first line of rawNote if title is blank/default
function displayTitle(n){
  const t=str(n.title).trim();
  const bad=['','walang laman','untitled','no title'];
  if(bad.includes(t.toLowerCase())){
    const raw=str(n.rawNote).trim();
    if(raw)return raw.split('\n')[0].slice(0,60)||(t||'Untitled');
  }
  return t||'Untitled';
}
// Card shows first keyPoint (short, punchy). Falls back to summary then rawNote preview.
function displaySummary(n){
  // Try first keyPoint — should be 3-7 words
  const kps=Array.isArray(n.keyPoints)?n.keyPoints:[];
  const firstKP=kps.map(k=>str(k).trim()).find(k=>k.length>0&&k.length<120);
  if(firstKP)return firstKP;
  // Fallback to summary if meaningful
  const s=str(n.summary).trim();
  const bad=['','walang mahalagang impormasyon','walang laman','no summary','n/a'];
  if(!bad.includes(s.toLowerCase())&&s)return s.slice(0,120);
  // Last resort: rawNote first line
  const raw=str(n.rawNote).trim();
  if(raw){const lines=raw.split('\n').filter(l=>l.trim());return lines[0].slice(0,100);}
  return'';
}
function setAppF(f,btn){appFilt=f;document.querySelectorAll('#app-filters .fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderApp();}
function doSearch(v){searchQ=v.toLowerCase();renderApp();}

// ============================================================
// VIEW MODAL
// ============================================================
function renderOrgContent(raw){
  const s=str(raw).trim();
  if(!s)return'<span style="color:var(--text-m);font-style:italic;font-size:13px">Walang laman</span>';
  const lines=s.split('\n');
  let html='';
  for(const line of lines){
    const t=line.trim();
    if(!t){html+='<div style="height:5px"></div>';continue;}
    if(t.startsWith('## ')){html+=`<div class="org-h">${esc(t.slice(3))}</div>`;}
    else if(t.startsWith('• ')||t.startsWith('- ')){
      html+=`<div class="org-bullet"><span class="org-bullet-dot">•</span><span>${esc(t.slice(2))}</span></div>`;
    }else{html+=`<div class="org-p">${esc(t)}</div>`;}
  }
  return html;
}
function switchViewTab(t){
  currentViewTab=t;
  document.getElementById('mvt-notes').classList.toggle('on',t==='notes');
  document.getElementById('mvt-summary').classList.toggle('on',t==='summary');
  renderViewBody();
}
function renderViewBody(){
  const n=currentViewNote;if(!n)return;
  const body=document.getElementById('mv-body');
  if(currentViewTab==='notes'){
    // Show rawNote (user's actual input). Fallback to organizedContent for older notes.
    const display=str(n.rawNote)||str(n.organizedContent);
    const isEmpty=!display.trim();
    const copyBtn=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button onclick="copyNotes()" style="display:flex;align-items:center;gap:6px;background:var(--ag);border:1px solid var(--border-h);border-radius:8px;color:var(--a2);font-size:12px;font-weight:600;padding:6px 13px;cursor:pointer;font-family:'Outfit',sans-serif"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button></div>`;
    const noteBox=isEmpty
      ?`<div style="color:var(--text-m);font-style:italic;font-size:13px;text-align:center;padding:30px 0">Walang laman</div>`
      :`<div style="white-space:pre-wrap;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.85;color:var(--text-b);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px">${esc(display)}</div>`;
    body.innerHTML=copyBtn+noteBox;
  }else{
    // Normalize keyPoints — handle array, object, string, or null
    let kps=[];
    if(Array.isArray(n.keyPoints)){kps=n.keyPoints.map(k=>str(k)).filter(k=>k.trim());}
    else if(n.keyPoints&&typeof n.keyPoints==='object'){kps=Object.values(n.keyPoints).map(str).filter(k=>k.trim());}
    else if(typeof n.keyPoints==='string'&&n.keyPoints.trim()){kps=[n.keyPoints];}
    // Normalize summary
    const summaryText=str(n.summary).trim();
    const badSummary=['','walang mahalagang impormasyon','walang laman','no summary','n/a'];
    const summaryDisplay=badSummary.includes(summaryText.toLowerCase())
      ?`<span style="color:var(--text-m);font-style:italic;font-size:13px">Walang summary — i-edit ang note para ma-regenerate ng AI.</span>`
      :esc(summaryText);
    const kpHtml=kps.length
      ?`<div class="vs"><div class="vs-l">&#x1F511; Key Points</div><div class="kp-list">${kps.map(p=>`<div class="kp-item"><span class="kp-arrow">&#x2192;</span><span>${esc(p)}</span></div>`).join('')}</div></div>`
      :`<div class="vs"><div class="vs-l">&#x1F511; Key Points</div><div style="color:var(--text-m);font-style:italic;font-size:13px">Walang key points — i-edit ang note para ma-regenerate ng AI.</div></div>`;
    body.innerHTML=`<div class="vs"><div class="vs-l">&#x1F4A1; Summary</div><div class="vs-box">${summaryDisplay}</div></div>${kpHtml}`;
  }
}
function copyNotes(){
  const n=currentViewNote;if(!n)return;
  const text=str(n.rawNote)||str(n.organizedContent);
  navigator.clipboard.writeText(text).then(()=>showToast('Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('Copied!');
  });
}
function openView(key){
  const n=window.allNotes.find(x=>(x.fbKey===key||String(x.id)===String(key)));
  if(!n)return;
  currentViewKey=key;currentViewNote=n;currentViewTab='notes';
  const isPub=n.isPublic===true;
  document.getElementById('mv-meta').innerHTML=`
    <span ${getCatPill(n.category)} style="font-size:11px">${getCatEmoji(n.category)} ${n.category}</span>
    <span style="font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace">${n.date||''}</span>
    ${n.author?`<span style="font-size:11px;color:var(--text-m)">· ${esc(n.author)}</span>`:''}`;
  document.getElementById('mv-title').textContent=displayTitle(n);
  document.getElementById('mv-vis-area').innerHTML=`
    <span class="vis-badge ${isPub?'pub':'priv'}" style="cursor:pointer;font-size:11px" onclick="toggleNoteVisibility('${n.fbKey||''}',${isPub},event)">
      ${isPub?'🌐 Public':'🔒 Private'}<span style="opacity:0.4;font-size:9px;margin-left:4px">· toggle</span>
    </span>`;
  document.getElementById('mv-edit-btn').onclick=()=>{openEdit(key);};
  document.getElementById('mv-del-btn').onclick=()=>delNote(n.fbKey||'',n.id,null);
  document.getElementById('mvt-notes').classList.add('on');
  document.getElementById('mvt-summary').classList.remove('on');
  renderViewBody();
  document.getElementById('ov-view').classList.add('on');
}
function closeView(){document.getElementById('ov-view').classList.remove('on');currentViewKey=null;currentViewNote=null;}

// ============================================================
// EDIT MODAL
// ============================================================
function openEdit(key){
  const n=window.allNotes.find(x=>(x.fbKey===key||String(x.id)===String(key)));
  if(!n)return;
  editingKey=key;
  // Show rawNote if available, otherwise fall back to organizedContent for older notes
  const rawVal=str(n.rawNote)||str(n.organizedContent);
  document.getElementById('me-body').innerHTML=`
    <div class="ef"><div class="ef-l">Title</div><input class="ef-in" id="ef-title" value="${esc(n.title)}"></div>
    <div class="ef-row">
      <div class="ef"><div class="ef-l">Category</div><input class="ef-in" id="ef-cat" value="${esc(n.category)}" placeholder="IT, STUDY, CRYPTO..."></div>
      <div class="ef"><div class="ef-l">Visibility</div>
        <select class="ef-in" id="ef-vis">
          <option value="public" ${n.isPublic!==false?'selected':''}>🌐 Public</option>
          <option value="private" ${n.isPublic===false?'selected':''}>🔒 Private</option>
        </select>
      </div>
    </div>
    <div class="ef" style="flex:1;display:flex;flex-direction:column">
      <div class="ef-l">Your Notes</div>
      <textarea class="ef-in ef-ta tall" id="ef-rawnote" style="flex:1;min-height:220px">${esc(rawVal)}</textarea>
    </div>
    <div style="background:var(--ag2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--text-m);display:flex;align-items:center;gap:8px;margin-top:4px">
      <span>🤖</span><span>I-save mo — mag-re-organize si AI gamit ang edited notes mo.</span>
    </div>`;
  closeView();
  document.getElementById('ov-edit').classList.add('on');
}
function closeEdit(){document.getElementById('ov-edit').classList.remove('on');editingKey=null;}
function addKP(){
  const list=document.getElementById('kp-list');
  const idx=list.children.length;
  const row=document.createElement('div');
  row.className='kp-edit-row';row.id=`kp-row-${idx}`;
  row.innerHTML=`<input class="ef-in" id="kp-${idx}" value=""><button class="kp-rm" onclick="removeKP(${idx})" title="Remove">×</button>`;
  list.appendChild(row);
  row.querySelector('input').focus();
}
function removeKP(idx){const row=document.getElementById(`kp-row-${idx}`);if(row)row.remove();}
async function saveEdit(){
  if(!editingKey)return;
  const n=window.allNotes.find(x=>(x.fbKey===editingKey||String(x.id)===String(editingKey)));
  if(!n)return;
  const title=document.getElementById('ef-title').value.trim()||n.title;
  const category=(document.getElementById('ef-cat').value.trim()||n.category).toUpperCase().replace(/\s+/g,'_');
  const isPublic=document.getElementById('ef-vis').value==='public';
  const rawNote=document.getElementById('ef-rawnote').value.trim();
  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  btn.innerHTML='<span style="animation:blk 1s infinite alternate;display:inline-block">🤖 Re-organizing...</span>';
  try{
    // Re-run AI on edited rawNote
    function ensureStr(v){if(v==null)return'';if(typeof v==='string')return v;if(typeof v==='object')return Object.entries(v).map(([k,vv])=>k+': '+vv).join('\n');return String(v);}
    function ensureArr(v){if(Array.isArray(v))return v.map(ensureStr).filter(Boolean);if(typeof v==='string'&&v)return[v];return[];}
    let updates={title,category,isPublic,rawNote};
    if(rawNote){
      const res=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1800,messages:[{role:'system',content:buildSysPrompt()},{role:'user',content:'I-organize ang notes na ito:\n\n'+rawNote}]})});
      const data=await res.json();
      if(!data.error){
        const raw=data.choices[0].message.content.replace(/```json|```/g,'').trim();
        try{
          const p=JSON.parse(raw);
          // Use AI category if user didn't change it manually, else keep user's
          const aiCat=(ensureStr(p.category)||'OTHER').toUpperCase().replace(/\s+/g,'_');
          updates={
            title:title||(ensureStr(p.title)||'Untitled'),
            category:category!==n.category?category:aiCat,
            isPublic,rawNote,
            summary:ensureStr(p.summary),
            keyPoints:ensureArr(p.keyPoints),
            organizedContent:ensureStr(p.organizedContent),
          };
        }catch(e){console.error('AI parse error',e);}
      }
    }
    if(window._db&&window._update&&window._ref&&n.fbKey){
      await window._update(window._ref(window._db,`notes/${n.fbKey}`),updates);
      await updateAIMemory({...n,...updates});
    }else{
      Object.assign(n,updates);renderApp();
      await updateAIMemory({...n,...updates});
    }
    showToast('✅ Updated & re-organized!');
    closeEdit();
  }catch(err){console.error(err);showToast('⚠️ Failed: '+err.message);}
  btn.disabled=false;
  btn.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Changes';
}

// ============================================================
// UTILS
// ============================================================
function doSignOut(){if(!confirm('Sign out?'))return;window._signOut().then(()=>window.location.href='index.html');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeView();closeEdit();}});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3200);}

// PWA
function showStrip(){document.getElementById('install-strip').classList.add('show');}
function hideStrip(){document.getElementById('install-strip').classList.remove('show');}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!sessionStorage.getItem('installDismissed'))showStrip();});
async function installApp(){if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;hideStrip();}else{showToast(/iPhone|iPad|iPod/i.test(navigator.userAgent)?'📲 Tap Share → Add to Home Screen':'📲 Open browser menu → Install App');setTimeout(hideStrip,500);}}
function dismissInstall(){sessionStorage.setItem('installDismissed','1');hideStrip();}
(function(){const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;if(isMobile&&!isStandalone&&!sessionStorage.getItem('installDismissed'))setTimeout(showStrip,1500);})();
window.addEventListener('appinstalled',()=>{showToast('✦ App installed!');hideStrip();});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

renderApp();
</script>
