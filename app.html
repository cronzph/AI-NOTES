<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Notes AI — App</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update, get, goOnline, goOffline } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  async function initFirebase() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) throw new Error('Config fetch failed');
      const json = await res.json();
      const firebase = json?.firebase?.apiKey ? json.firebase
                     : json?.apiKey            ? json
                     : json?.config?.apiKey    ? json.config
                     : Object.values(json||{}).find(v => v?.apiKey) || null;
      if (!firebase) throw new Error('No apiKey in config: ' + JSON.stringify(json));
      const app = initializeApp(firebase);
      const db = getDatabase(app);
      const auth = getAuth(app);
      window._db = db; window._auth = auth;
      window._goOnline = () => goOnline(db);
      window._goOffline = () => goOffline(db);
      // Keep notes synced for offline access
      onValue(ref(db, 'notes'), () => {}, { onlyOnce: false });
      window._ref = ref; window._push = push; window._remove = remove;
      window._update = update; window._get = get;
      window._signOut = () => signOut(auth);

      onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        window._currentUser = user;
        const initials = (user.displayName || user.email || '?')[0].toUpperCase();
        document.getElementById('user-av').textContent = initials;
        document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
        loadAIMemory();
        // Init friend system after Firebase is ready
        setTimeout(function(){
          if(typeof initFriendSystem === 'function') initFriendSystem();
        }, 500);
      });

      const notesRef = ref(db, 'notes');
      onValue(notesRef, snap => {
        const data = snap.val();
        window.allNotes = data
          ? Object.entries(data).map(([fbKey,v]) => ({fbKey,...v})).sort((a,b) => b.id - a.id)
          : [];
        renderApp();
      });
    } catch(err) {
      console.error(err);
      window.location.href = 'auth.html';
    }
  }
  initFirebase();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050810;--bg2:#07091a;--surface:#0c1022;--surface2:#10162e;--surface3:#151e3f;
  --border:rgba(59,130,246,0.1);--border-h:rgba(59,130,246,0.28);
  --text:#7a9ac7;--text-b:#ddeeff;--text-m:#2e4470;
  --a:#3b82f6;--a2:#60a5fa;--ag:rgba(59,130,246,0.13);--ag2:rgba(59,130,246,0.06);
  --cyan:#22d3ee;--red:#f87171;--green:#4ade80;--purple:#a78bfa;
  --r:16px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);top:-250px;right:-150px;animation:orb 14s ease-in-out infinite alternate}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(34,211,238,0.04) 0%,transparent 70%);bottom:-150px;left:-100px;animation:orb 18s ease-in-out infinite alternate-reverse}
@keyframes orb{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,-30px) scale(1.1)}}

/* INSTALL STRIP */
#install-strip{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(90deg,#0d1f4e,#0c1022);border-bottom:1px solid var(--border-h);padding:10px 16px;align-items:center;justify-content:space-between;gap:10px}
#install-strip.show{display:flex}
.s-left{display:flex;align-items:center;gap:10px}
.s-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-title{font-size:13px;font-weight:700;color:var(--text-b)}
.s-sub{font-size:11px;color:var(--text-m);margin-top:1px}
.s-btns{display:flex;gap:6px;flex-shrink:0}
.s-dismiss{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-m);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;font-family:'Outfit',sans-serif}
.s-install{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}

/* APP NAV */
.app-nav{position:relative;z-index:50;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;gap:10px;background:rgba(5,8,16,0.94);backdrop-filter:blur(28px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--text-b);letter-spacing:-0.5px;text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 14px rgba(59,130,246,0.4);animation:lgo 3s ease-in-out infinite}
@keyframes lgo{0%,100%{box-shadow:0 0 12px rgba(59,130,246,0.4)}50%{box-shadow:0 0 26px rgba(59,130,246,0.65)}}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;flex:1;max-width:280px;transition:all 0.2s}
.search-wrap:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.search-wrap svg{color:var(--text-m);flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;color:var(--text-b);font-family:'Outfit',sans-serif;font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text-m)}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-b);cursor:pointer;transition:all 0.2s;flex-shrink:0}
.user-pill:hover{border-color:var(--border-h)}
.user-avatar{width:22px;height:22px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}

/* LAYOUT */
.app-body{flex:1;display:grid;grid-template-columns:320px 1fr;min-height:0;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;min-height:0}

.hidden{display:none!important}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-m);font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* ── COMPOSER — unified message-style input ── */
.composer{flex:1;display:flex;flex-direction:column;min-height:0;padding:12px;gap:0}

/* Outer bubble — the whole input area */
.composer-box{
  flex:1;display:flex;flex-direction:column;min-height:0;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.composer-box:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}

/* Textarea inside composer */
textarea.ti{
  flex:1;min-height:120px;background:transparent;border:none;
  color:var(--text-b);font-family:'JetBrains Mono',monospace;
  font-size:12px;line-height:1.9;padding:13px 14px;
  resize:none;outline:none;width:100%;
  overflow-y:auto;scrollbar-width:thin;
}
textarea.ti::placeholder{color:var(--text-m);font-size:11.5px}

/* Image chip strip — shown when image is attached */
.img-chip-strip{
  display:none;flex-direction:row;align-items:center;gap:8px;
  padding:8px 12px;border-top:1px solid var(--border);
  background:var(--surface3);flex-shrink:0;flex-wrap:wrap;
}
.img-chip-strip.show{display:flex}
.img-chip{
  position:relative;border-radius:8px;overflow:hidden;
  width:56px;height:56px;flex-shrink:0;cursor:pointer;
  border:1px solid var(--border-h);
  transition:transform 0.15s,box-shadow 0.15s;
}
.img-chip:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(0,0,0,0.4)}
.img-chip img{width:100%;height:100%;object-fit:cover;display:block}
.img-chip-rm{
  position:absolute;top:2px;right:2px;
  width:16px;height:16px;border-radius:50%;
  background:rgba(0,0,0,0.75);color:#fff;
  font-size:9px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;line-height:1;border:none;
  transition:background 0.15s;
}
.img-chip-rm:hover{background:var(--red)}
.img-chip-hint{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}

/* Composer toolbar — bottom bar with + button and paste hint */
.composer-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-top:1px solid var(--border);
  background:var(--surface3);flex-shrink:0;
}
/* + attach button */
.attach-btn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border-h);background:var(--surface2);
  color:var(--a2);font-size:18px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.18s;flex-shrink:0;
  line-height:1;
}
.attach-btn:hover{background:var(--ag);border-color:var(--a);transform:scale(1.08)}
.attach-btn:active{transform:scale(0.95)}
.toolbar-hint{font-size:10px;color:var(--text-m);font-family:'JetBrains Mono',monospace;flex:1}
.toolbar-hint kbd{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:9px;color:var(--a2)}

/* Hidden file input */
#fi{display:none}

/* Full-size image lightbox */
.lightbox{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;backdrop-filter:blur(10px)}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 20px 80px rgba(0,0,0,0.6);object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.lightbox-close:hover{background:rgba(248,113,113,0.3);border-color:var(--red)}

/* AI MEMORY BAR */
.ai-mem-bar{display:none;align-items:center;gap:8px;background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.18);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--purple);flex-shrink:0;margin:0 12px}
.ai-mem-bar.show{display:flex}
.ai-mem-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0;animation:mpulse 2s infinite}
@keyframes mpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(167,139,250,0.5)}70%{opacity:0.7;box-shadow:0 0 0 5px rgba(167,139,250,0)}}

/* VIS TOGGLE */
.vis-toggle-wrap{padding:0 12px;flex-shrink:0;margin-bottom:2px}
.vis-toggle{width:100%;display:flex;align-items:center;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);background:var(--surface2)}
.vis-opt{flex:1;padding:9px 6px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all 0.22s;color:var(--text-m);border:none;background:transparent}
.vis-opt span{font-size:14px;line-height:1}
.vis-opt.active-pub{background:linear-gradient(135deg,rgba(34,211,238,0.18),rgba(59,130,246,0.18));color:var(--cyan)}
.vis-opt.active-priv{background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(99,102,241,0.18));color:var(--purple)}
.vis-opt:hover:not(.active-pub):not(.active-priv){color:var(--text-b);background:var(--ag2)}
.vis-divider{width:1px;background:var(--border);flex-shrink:0}

/* PROC AREA */
.proc-area{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.proc-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 18px rgba(59,130,246,0.3);position:relative;overflow:hidden}
.proc-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%)}
.proc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(59,130,246,0.45)}
.proc-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.lbar{display:none}
.lbar.on{display:block}
.lbar-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.lbar-fill{height:100%;background:linear-gradient(90deg,transparent,var(--a2),var(--cyan),transparent);animation:ls 1.8s ease-in-out infinite}
@keyframes ls{0%{transform:translateX(-100%) scaleX(0.4)}100%{transform:translateX(200%) scaleX(0.4)}}
.lbar-txt{font-size:11px;color:var(--a2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-align:center;margin-top:6px;animation:blk 1s ease-in-out infinite alternate}
@keyframes blk{from{opacity:0.4}to{opacity:1}}

/* MAIN PANEL */
.main-content{overflow-y:auto;padding:0;background:var(--bg2);display:flex;flex-direction:column}
.main-content
/* OFFLINE CARD STYLES */
.anc._offline-card{border:1px dashed rgba(251,191,36,0.4)!important;opacity:0.85}
.offline-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  font-family:'JetBrains Mono',monospace;background:rgba(217,119,6,0.12);color:#fbbf24;
  border:1px solid rgba(251,191,36,0.25);padding:2px 7px;border-radius:5px;
  animation:offpulse 1.6s ease-in-out infinite}
@keyframes offpulse{0%,100%{opacity:1}50%{opacity:0.45}}
::-webkit-scrollbar{width:4px}
.main-content::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* MAIN TABS */
.main-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 16px}
.mtab{display:flex;align-items:center;gap:6px;padding:13px 16px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;color:var(--text-m);background:none;border:none;border-bottom:2px solid transparent;transition:all 0.2s;position:relative}
.mtab.active{color:var(--a2);border-bottom-color:var(--a2)}
.mtab:hover:not(.active){color:var(--text-b)}
.mtab-count{background:var(--ag);color:var(--a2);font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.mtab.active .mtab-count{background:rgba(96,165,250,0.2)}

/* TAB PANELS */
.tab-panel{display:none;flex:1;padding:14px 16px;overflow-y:auto}
.tab-panel.active{display:block}
.tab-panel::-webkit-scrollbar{width:4px}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.filters{display:flex;gap:5px;flex-wrap:wrap;flex:1;min-width:0}
.fb{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.fb:hover{border-color:var(--border-h);color:var(--text)}
.fb.on{background:var(--ag);border-color:var(--border-h);color:var(--a2)}
.vis-pills{display:flex;gap:4px;flex-shrink:0}
.vpill{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;color:var(--text-m)}
.vpill:hover{border-color:var(--border-h);color:var(--text-b)}
.vpill.on-all{background:var(--ag);border-color:var(--border-h);color:var(--a2)}
.vpill.on-pub{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.3);color:var(--cyan)}
.vpill.on-priv{background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3);color:var(--purple)}

.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(220px,28vw,270px),1fr));gap:12px}

/* AI FAB */
.ai-fab{
  position:fixed;bottom:24px;right:24px;z-index:350;
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 28px rgba(59,130,246,0.5);
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  color:#fff;
}
.ai-fab:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 10px 36px rgba(59,130,246,0.65)}
.ai-fab:active{transform:scale(0.94)}
.ai-fab .ai-fab-x{display:none;font-size:18px;font-weight:300;line-height:1}
.ai-fab .ai-fab-ico{display:block;transition:all 0.2s}
.ai-fab.active .ai-fab-ico{display:none}
.ai-fab.active .ai-fab-x{display:block}
.ai-fab.active{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 6px 28px rgba(239,68,68,0.4)}
/* Pulse ring when not open */
.ai-fab::after{content:'';position:absolute;inset:-4px;border-radius:20px;border:2px solid rgba(59,130,246,0.4);animation:fabring 2.5s ease-in-out infinite;pointer-events:none}
@keyframes fabring{0%,100%{opacity:0;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.ai-fab.active::after{display:none}

/* AI CHAT PANEL */
.ai-panel{
  position:fixed;bottom:90px;right:24px;z-index:340;
  width:360px;max-height:520px;
  background:var(--surface);border:1px solid var(--border-h);
  border-radius:20px;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  transform:translateY(20px) scale(0.95);opacity:0;pointer-events:none;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.ai-panel.open{transform:none;opacity:1;pointer-events:all}
.ai-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.ai-panel-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--text-b)}
.ai-panel-dot{width:8px;height:8px;border-radius:50%;background:var(--a2);animation:mpulse 2s infinite;flex-shrink:0}
.ai-panel-close{width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text-m);transition:all 0.2s}
.ai-panel-close:hover{border-color:var(--red);color:var(--red)}
.ai-chat-feed{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-height:0;scrollbar-width:thin}
.ai-chat-feed::-webkit-scrollbar{width:3px}
.ai-chat-feed::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* Chat messages */
.aicm{display:flex}
.aicm-ai{justify-content:flex-start}
.aicm-user{justify-content:flex-end}
.aicm-bubble{
  max-width:88%;padding:9px 13px;border-radius:14px;
  font-size:12.5px;line-height:1.65;
}
.aicm-ai .aicm-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text-b);border-radius:4px 14px 14px 14px}
.aicm-user .aicm-bubble{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border-radius:14px 14px 4px 14px}

/* Typing indicator */
.aicm-typing{display:flex;align-items:center;gap:4px;padding:11px 14px}
.aicm-typing span{width:6px;height:6px;border-radius:50%;background:var(--text-m);animation:tydot 1.2s ease-in-out infinite}
.aicm-typing span:nth-child(2){animation-delay:0.2s}
.aicm-typing span:nth-child(3){animation-delay:0.4s}
@keyframes tydot{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* Quick prompt chips */
.ai-quick-prompts{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}
.ai-qp{
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text-m);font-size:11px;font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;
  transition:all 0.18s;white-space:nowrap;
}
.ai-qp:hover{border-color:var(--a);color:var(--a2);background:var(--ag)}

/* Chat input */
.ai-chat-input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
}
.ai-chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text-b);
  font-family:'Outfit',sans-serif;font-size:13px;
  padding:9px 12px;resize:none;outline:none;
  min-height:38px;max-height:120px;line-height:1.5;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.ai-chat-input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.ai-chat-input::placeholder{color:var(--text-m);font-size:12px}
.ai-chat-send{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border:none;border-radius:10px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;
}
.ai-chat-send:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(59,130,246,0.4)}
.ai-chat-send:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* NOTE CARD */
.anc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);animation:cin 0.3s ease both;cursor:pointer}
@keyframes cin{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none}}
.anc:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.3)}
.anc.community{border-left:2px solid rgba(34,211,238,0.3)}
.nc-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.nc-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cpill{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:3px 9px;border-radius:6px;white-space:nowrap}
.nc-date{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}
.vis-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;padding:3px 8px;border-radius:6px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
.vis-badge.pub{background:rgba(34,211,238,0.1);color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.vis-badge.priv{background:rgba(167,139,250,0.1);color:var(--purple);border-color:rgba(167,139,250,0.2)}
.vis-badge.pub.toggle:hover{filter:brightness(1.2);transform:scale(1.04)}
.vis-badge.priv.toggle:hover{filter:brightness(1.2);transform:scale(1.04)}
.nc-title{font-size:14px;font-weight:700;color:var(--text-b);line-height:1.3;margin-bottom:7px}
.nc-summary{font-size:12.5px;color:var(--text);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.anc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;margin-top:10px;border-top:1px solid var(--border)}
.anc-src{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px}
.anc-btns{display:flex;gap:5px}
.anc-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.anc-btn:hover{border-color:var(--a);color:var(--a2)}
.anc-btn.edit-b:hover{border-color:rgba(74,222,128,0.4);color:var(--green)}
.anc-btn.del:hover{border-color:rgba(248,113,113,0.4);color:var(--red)}

/* OVERLAYS */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.78);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
@keyframes min{from{opacity:0;transform:scale(0.93) translateY(20px)}to{opacity:1;transform:none}}

/* VIEW MODAL */
.modal-view{background:var(--surface);border:1px solid var(--border-h);border-radius:20px;width:100%;max-width:700px;max-height:91vh;display:flex;flex-direction:column;animation:min 0.28s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 28px 90px rgba(0,0,0,0.65);position:relative}
.mv-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text-m);z-index:2}
.mv-close:hover{border-color:var(--red);color:var(--red)}
.mv-head{padding:20px 22px 0;flex-shrink:0}
.mv-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.mv-title{font-size:21px;font-weight:900;color:var(--text-b);line-height:1.15;letter-spacing:-0.6px;padding-right:40px;margin-bottom:4px}
.mv-tabs{display:flex;gap:0;padding:0 22px;border-bottom:1px solid var(--border);flex-shrink:0;margin-top:6px}
.mv-tab{padding:10px 16px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;color:var(--text-m);border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.mv-tab.on{color:var(--a2);border-bottom-color:var(--a2)}
.mv-tab:hover:not(.on){color:var(--text-b)}
.mv-body{flex:1;overflow-y:auto;padding:20px 22px 6px}
.mv-body::-webkit-scrollbar{width:4px}
.mv-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.vs{margin-bottom:20px}
.vs-l{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a2);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.vs-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:15px 16px;font-size:13.5px;color:var(--text-b);line-height:1.8}
.kp-list{display:flex;flex-direction:column;gap:8px}
.kp-item{display:flex;gap:10px;font-size:13.5px;color:var(--text-b);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px}
.kp-arrow{color:var(--a2);flex-shrink:0;font-weight:700;margin-top:1px}
.mv-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;flex-wrap:wrap}
.mv-foot-r{display:flex;gap:7px}
.mfbtn{padding:8px 16px;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-m)}
.mfbtn:hover{border-color:var(--border-h);color:var(--text-b)}
.mfbtn.edit{border-color:rgba(74,222,128,0.3);color:var(--green);background:rgba(74,222,128,0.06)}
.mfbtn.edit:hover{border-color:var(--green);background:rgba(74,222,128,0.12);transform:translateY(-1px)}
.mfbtn.del{border-color:rgba(248,113,113,0.2);color:var(--red);background:rgba(248,113,113,0.05)}
.mfbtn.del:hover{border-color:var(--red);background:rgba(248,113,113,0.1)}

/* EDIT MODAL */
.modal-edit{background:var(--surface);border:1px solid var(--border-h);border-radius:20px;width:100%;max-width:640px;max-height:91vh;display:flex;flex-direction:column;animation:min 0.28s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 28px 90px rgba(0,0,0,0.65)}
.me-head{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:8px}
.me-title-txt{font-size:16px;font-weight:800;color:var(--text-b);display:flex;align-items:center;gap:8px}
.me-close{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text-m)}
.me-close:hover{border-color:var(--red);color:var(--red)}
.me-body{flex:1;overflow-y:auto;padding:4px 22px 16px}
.me-body::-webkit-scrollbar{width:4px}
.me-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.ef{margin-bottom:15px}
.ef-l{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--a2);font-family:'JetBrains Mono',monospace;margin-bottom:7px}
.ef-in{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-b);font-family:'Outfit',sans-serif;font-size:13px;padding:10px 13px;outline:none;transition:all 0.2s}
.ef-in:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.ef-ta{resize:vertical;line-height:1.75;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:90px}
.ef-ta.tall{min-height:155px}
.ef-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.me-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}
.btn-save{padding:10px 22px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(59,130,246,0.3)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(59,130,246,0.45)}
.btn-save:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-cancel{padding:10px 18px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text-m);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{border-color:var(--border-h);color:var(--text-b)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-h);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-b);z-index:500;display:none;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,0.45);animation:tpop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes tpop{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

.cIT{background:rgba(59,130,246,0.15);color:#93c5fd}
.cSTUDY{background:rgba(34,211,238,0.12);color:#67e8f9}
.cFREELANCE{background:rgba(251,191,36,0.13);color:#fde68a}
.cCRYPTO{background:rgba(251,146,60,0.13);color:#fed7aa}
.cPERSONAL{background:rgba(129,140,248,0.13);color:#c4b5fd}
.cOTHER{background:rgba(148,163,184,0.13);color:#e2e8f0}
.empty{grid-column:1/-1;padding:40px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-ico{font-size:32px;opacity:0.15}
.empty-t{font-size:15px;font-weight:800;color:var(--text-m)}
.empty-s{font-size:12px;color:var(--text-m);opacity:0.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* Edit modal image chip */
.ef-img-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.ef-img-chip{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--border-h);flex-shrink:0;cursor:zoom-in}
.ef-img-chip img{width:100%;height:100%;object-fit:cover;display:block}
.ef-img-chip-rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.75);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:background 0.15s}
.ef-img-chip-rm:hover{background:var(--red)}
.ef-img-actions{display:flex;flex-direction:column;gap:6px;justify-content:center}
.ef-img-btn{display:inline-flex;align-items:center;gap:5px;background:var(--ag);border:1px solid var(--border-h);border-radius:7px;color:var(--a2);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;white-space:nowrap}
.ef-img-btn:hover{background:var(--surface3);border-color:var(--a)}
#ef-fi{display:none}

@media(max-width:768px){
  html,body{height:auto;overflow:auto}
  .app-body{grid-template-columns:1fr;overflow:visible}
  .sidebar{height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .composer{min-height:260px}
  textarea.ti{flex:none;min-height:160px;height:200px}
  .main-content{min-height:60vh;overflow:visible;flex:none}
  .tab-panel{overflow:visible;max-height:none}
  .app-grid{grid-template-columns:1fr}
  .user-uname,.user-out{display:none}
  .ef-row{grid-template-columns:1fr}
  .modal-view,.modal-edit{max-height:96vh;border-radius:16px}
  .ai-panel{width:calc(100vw - 32px);right:16px;bottom:80px;max-height:60vh}
  .ai-fab{bottom:16px;right:16px}
}
.fd-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fd-pill:hover{border-color:var(--border-h);color:var(--text-b)}
.fd-pill.on{background:var(--ag);border-color:var(--border-h);color:var(--a2)}

</style>

<script>
const GROQ_URL='/api/groq';
window.allNotes=window.allNotes||[];
let appFilt='ALL',searchQ='',visFilt='all';
let b64=null,noteVisibility='public';
let deferredPrompt=null;
let aiMemory={};
let mainTab='mine'; // 'mine' | 'community'
let filterDropdownOpen = false;
let sourceFilter = null;  // null | 'text' | 'img'
let activeCatFilters = new Set();

// ============================================================
// AUTHOR DETECTION
// ============================================================
function isMyNote(n){
  const user=window._currentUser;
  if(!user||!n.author)return false;
  const e=user.email||'';
  return n.author===e||n.author===(user.displayName||'')||n.author===e.split('@')[0];
}

// ============================================================
// AI MEMORY
// ============================================================
async function loadAIMemory(){
  if(!window._db||!window._ref||!window._get)return;
  try{
    const snap=await window._get(window._ref(window._db,'ai_memory'));
    if(snap.exists()){
      aiMemory=snap.val()||{};
      loadCustomCategories();
      const c=Object.keys(aiMemory).length;
      if(c>0){
        document.getElementById('aiMemBar').classList.add('show');
        document.getElementById('aiMemTxt').textContent=`AI memory: ${c} topic${c>1?'s':''} learned`;
      }
    }
  }catch(e){console.error('AI memory:',e);}
}
async function updateAIMemory(note){
  if(!window._db||!window._update||!window._ref)return;
  try{
    const skipTitles=['test','testing','try','tries','sample','pantest','dummy','placeholder','blank','temp','temporary','walang lamina','untitled'];
    const t=(note.title||'').toLowerCase().trim();
    if(skipTitles.some(s=>t===s||t.startsWith(s+' ')))return;
    if(!note.summary||note.summary.toLowerCase().includes('walang mahalagang'))return;
    const k=(note.category+'_'+note.title).toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,60);
    if(aiMemory[k])return;
    const entry={title:note.title,category:note.category,keyPoints:(note.keyPoints||[]).slice(0,5),summary:(note.summary||'').substring(0,200),updated:Date.now()};
    await window._update(window._ref(window._db,'ai_memory'),{[k]:entry});
    aiMemory[k]=entry;
    const c=Object.keys(aiMemory).length;
    document.getElementById('aiMemBar').classList.add('show');
    document.getElementById('aiMemTxt').textContent=`AI memory: ${c} topic${c>1?'s':''} learned`;
  }catch(e){console.error('AI memory update:',e);}
}
function buildMemoryContext(){
  const entries=Object.values(aiMemory);
  if(!entries.length)return'';
  const sorted=entries.sort((a,b)=>(b.updated||0)-(a.updated||0)).slice(0,20);
  const rules=sorted.filter(e=>e.categoryRule);
  const topics=sorted.filter(e=>!e.categoryRule);
  let ctx='';
  if(rules.length){
    ctx+='\n\nCATEGORY RULES (SUNDIN MO PALAGI — user preference ito):\n';
    ctx+=rules.map(e=>`• [${e.category}] ${e.title}: ${e.categoryRule}`).join('\n');
  }
  if(topics.length){
    ctx+='\n\nLEARNED CONTEXT:\n';
    ctx+=topics.map(e=>`[${e.category}] ${e.title}: ${e.summary||''}${(e.keyPoints||[]).length?' \u2192 '+(e.keyPoints||[]).join(' | '):''}`).join('\n');
  }
  return ctx;
}

// ============================================================
// CATEGORY CONFIG
// ============================================================
const knownCats={
  IT:{stripe:'linear-gradient(90deg,#3b82f6,#60a5fa)',pill:'cIT',emoji:'💻'},
  STUDY:{stripe:'linear-gradient(90deg,#22d3ee,#67e8f9)',pill:'cSTUDY',emoji:'📚'},
  FREELANCE:{stripe:'linear-gradient(90deg,#fbbf24,#fde68a)',pill:'cFREELANCE',emoji:'💼'},
  CRYPTO:{stripe:'linear-gradient(90deg,#fb923c,#fed7aa)',pill:'cCRYPTO',emoji:'₿'},
  PERSONAL:{stripe:'linear-gradient(90deg,#818cf8,#c4b5fd)',pill:'cPERSONAL',emoji:'🙋'},
  OTHER:{stripe:'linear-gradient(90deg,#94a3b8,#cbd5e1)',pill:'cOTHER',emoji:'📌'},
};

// Custom categories from AI memory — loaded at runtime
function loadCustomCategories(){
  Object.values(aiMemory||{}).forEach(function(v){
    if(v.categoryRule && v.category && !knownCats[v.category]){
      knownCats[v.category]={
        stripe:dynColors[Object.keys(knownCats).length % dynColors.length],
        pill:null,
        emoji:'🏷️',
        custom:true
      };
    }
  });
}
const dynColors=['linear-gradient(90deg,#34d399,#6ee7b7)','linear-gradient(90deg,#f472b6,#fbcfe8)','linear-gradient(90deg,#a78bfa,#ddd6fe)','linear-gradient(90deg,#fb7185,#fda4af)','linear-gradient(90deg,#38bdf8,#bae6fd)'];
const dynPills=['background:rgba(52,211,153,0.13);color:#6ee7b7','background:rgba(244,114,182,0.13);color:#f9a8d4','background:rgba(167,139,250,0.13);color:#ddd6fe','background:rgba(251,113,133,0.13);color:#fda4af','background:rgba(56,189,248,0.13);color:#bae6fd'];
const catCache={};let colorIdx=0;
function getCatStyle(cat){if(knownCats[cat])return knownCats[cat];if(!catCache[cat]){catCache[cat]={stripe:dynColors[colorIdx%dynColors.length],pillStyle:dynPills[colorIdx%dynPills.length],emoji:'🏷️'};colorIdx++;}return catCache[cat];}
function getCatStripe(cat){return getCatStyle(cat).stripe;}
function getCatPill(cat){const s=getCatStyle(cat);return s.pill?`class="cpill ${s.pill}"`:`class="cpill" style="${s.pillStyle}"`;}
function getCatEmoji(cat){return getCatStyle(cat).emoji||'🏷️';}

// ============================================================
// AI PROMPT
// ============================================================
function buildSysPrompt(){
  return`Ikaw ay isang expert notes organizer. Mag-return ng PURE JSON ONLY — walang markdown backticks, walang preamble, walang extra text.

STRICT RULES:
1. "title" — REQUIRED. Specific, max 8 words. HUWAG gumamit ng "Walang Laman", "Untitled", o generic na title.
2. "summary" — REQUIRED. 1-2 sentences. Actual takeaway.
3. "keyPoints" — REQUIRED. 3-5 items. 3-7 words lang bawat isa.
4. "organizedContent" — organized version ng notes. Walang obvious definitions.
5. HUWAG mag-hallucinate.
6. CATEGORY RULES — kung may nakalagay na CATEGORY RULES sa ibaba, SUNDIN MO PALAGI. Priority sila kaysa sa default categorization.

JSON FORMAT:
{
  "title": "...",
  "category": "IT|STUDY|FREELANCE|CRYPTO|PERSONAL|OTHER"+(function(){
    var custom=Object.values(aiMemory||{}).filter(function(v){return v.categoryRule&&v.category&&!['IT','STUDY','FREELANCE','CRYPTO','PERSONAL','OTHER'].includes(v.category);}).map(function(v){return v.category;});
    return custom.length?'|'+custom.join('|'):'';
  })()+'|[ANY CUSTOM CATEGORY USER DEFINED]",
  "summary": "...",
  "keyPoints": ["...", "...", "..."],
  "organizedContent": "..."
}${buildMemoryContext()}`;
}

// ============================================================
// COMPOSER INPUT HANDLERS
// ============================================================
function autoGrow(el){
  // Keep textarea growing naturally on desktop; on mobile it's fixed height
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,320)+'px';
}

function onFile(e){const f=e.target.files[0];if(f)loadImg(f);}

function loadImg(file){
  const r=new FileReader();
  r.onload=ev=>{
    b64=ev.target.result.split(',')[1];
    // Set chip thumbnail
    document.getElementById('chipImg').src=ev.target.result;
    // Show chip strip
    document.getElementById('chipStrip').classList.add('show');
    // Attach lightbox click to chip
    document.getElementById('imgChip').onclick=function(e){
      if(e.target.classList.contains('img-chip-rm'))return;
      openLightbox(ev.target.result);
    };
    showToast('🖼️ Image attached!');
  };
  r.readAsDataURL(file);
}

function clearImg(e){
  if(e)e.stopPropagation();
  b64=null;
  document.getElementById('chipImg').src='';
  document.getElementById('chipStrip').classList.remove('show');
  document.getElementById('fi').value='';
}

// Drag-and-drop onto the composer box
const composerBox=document.getElementById('composer-box');
composerBox.addEventListener('dragover',e=>{e.preventDefault();composerBox.style.borderColor='var(--a)';});
composerBox.addEventListener('dragleave',()=>composerBox.style.borderColor='');
composerBox.addEventListener('drop',e=>{
  e.preventDefault();composerBox.style.borderColor='';
  const f=e.dataTransfer.files[0];
  if(f?.type.startsWith('image/'))loadImg(f);
});

// Clipboard paste — image OR text
document.addEventListener('paste',e=>{
  for(const item of e.clipboardData?.items||[]){
    if(item.type.startsWith('image/')){
      const f=item.getAsFile();if(!f)continue;
      loadImg(f);break;
    }
  }
});
function setVisibility(v){
  noteVisibility=v;
  document.getElementById('vOptPub').className='vis-opt'+(v==='public'?' active-pub':'');
  document.getElementById('vOptPriv').className='vis-opt'+(v==='private'?' active-priv':'');
}
function setVisFilt(v,btn){
  visFilt=v;
  ['vfAll','vfPub','vfPriv'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='vpill';});
  if(v==='all')btn.classList.add('on-all');
  else if(v==='public')btn.classList.add('on-pub');
  else btn.classList.add('on-priv');
  renderApp();
}

function switchMainTab(tab,btn){
  mainTab=tab;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tp=document.getElementById('tab-'+tab);if(tp)tp.classList.add('active');
  if(tab==='shared') renderSharedWithMe();
  if(tab==='sharedme'){const s=document.getElementById('sec-sharedme');if(s&&typeof renderSharedByMe==='function')renderSharedByMe(s);}
}

// ============================================================
// PROCESS
// ============================================================
async function process(){
  if(!window._currentUser){showToast('⚠️ Log in first!');return;}
  const text=document.getElementById('txtArea').value.trim();
  const hasImg=!!b64;
  const hasText=!!text;
  if(!hasText&&!hasImg)return showToast('⚠️ Mag-sulat ng notes o mag-attach ng image!');
  if(hasImg){
    // Pass text along as extra context if present
    await callGroqVision(b64,text);
  }else{
    await callGroq(text);
  }
}
function setLoading(on,msg='AI is thinking...'){
  const btn=document.getElementById('pb'),bar=document.getElementById('lbar');
  btn.disabled=on;btn.style.display=on?'none':'flex';bar.classList.toggle('on',on);
  document.getElementById('lbar-txt').textContent=msg;
}
async function callGroq(text){
  setLoading(true,'AI is organizing...');
  try{
    const res=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1800,messages:[{role:'system',content:buildSysPrompt()},{role:'user',content:'I-organize ang notes na ito:\n\n'+text}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    const content=data.choices?.[0]?.message?.content;
    if(!content)throw new Error('Empty response from AI');
    let raw=content.replace(/```json|```/g,'').trim();
    const start=raw.indexOf('{');const end=raw.lastIndexOf('}');
    if(start!==-1&&end!==-1)raw=raw.slice(start,end+1);
    const p=JSON.parse(raw);
    await saveNote(p,'text',text);
    document.getElementById('txtArea').value='';
    document.getElementById('txtArea').style.height='';
    showToast(`✦ Saved [${p.category}] · ${noteVisibility==='public'?'🌐 Public':'🔒 Private'}`);
  }catch(err){console.error(err);showToast('⚠️ '+err.message);}
  setLoading(false);
}
async function callGroqVision(imgB64,extraText=''){
  setLoading(true,'AI is reading image...');
  try{
    // Vision model: system prompt as text block + image + user text context
    const textBlock=extraText
      ?`${buildSysPrompt()}\n\nBasahin at i-organize ang notes sa image. May dagdag na text context ang user:\n\n${extraText}`
      :`${buildSysPrompt()}\n\nBasahin at i-organize ang notes sa image. Return PURE JSON only.`;
    const res=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'meta-llama/llama-4-scout-17b-16e-instruct',
      max_tokens:1800,
      messages:[{role:'user',content:[
        {type:'text',text:textBlock},
        {type:'image_url',image_url:{url:`data:image/jpeg;base64,${imgB64}`}}
      ]}]
    })});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    const content=data.choices?.[0]?.message?.content;
    if(!content)throw new Error('Empty response from AI');
    // Strip markdown fences and find JSON robustly
    let raw=content.replace(/```json|```/g,'').trim();
    // Find first { to last } in case model adds preamble
    const start=raw.indexOf('{');const end=raw.lastIndexOf('}');
    if(start!==-1&&end!==-1)raw=raw.slice(start,end+1);
    const p=JSON.parse(raw);
    window._pendingImgB64=imgB64;
    await saveNote(p,'img',extraText||'[image]');
    window._pendingImgB64=null;
    clearImg();
    document.getElementById('txtArea').value='';
    document.getElementById('txtArea').style.height='';
    showToast(`✦ Image saved [${p.category}] · ${noteVisibility==='public'?'🌐 Public':'🔒 Private'}`);
  }catch(err){console.error(err);showToast('⚠️ '+err.message);}
  setLoading(false);
}
async function saveNote(p,source,rawNote=''){
  function ensureStr(v){if(v==null)return'';if(typeof v==='string')return v;if(typeof v==='object')return Object.entries(v).map(([k,val])=>k+': '+val).join('\n');return String(v);}
  function ensureArr(v){if(Array.isArray(v))return v.map(ensureStr).filter(Boolean);if(typeof v==='string'&&v)return[v];return[];}
  const note={
    id:Date.now(),
    title:ensureStr(p.title)||'Untitled',
    category:(ensureStr(p.category)||'OTHER').toUpperCase().replace(/\s+/g,'_'),
    summary:ensureStr(p.summary),
    keyPoints:ensureArr(p.keyPoints),
    organizedContent:ensureStr(p.organizedContent),
    rawNote:rawNote||'',
    source,
    isPublic:noteVisibility==='public',
    date:new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}),
    time:new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}),
    author:window._currentUser?.displayName||window._currentUser?.email||'Anonymous',
    imageData:source==='img'?(window._pendingImgB64||''):'',
  };
  if(window._db&&window._push&&window._ref){
    try{await window._push(window._ref(window._db,'notes'),note);}
    catch(e){console.error(e);window.allNotes.unshift(note);renderApp();}
  }else{window.allNotes.unshift(note);renderApp();}
  appFilt='ALL';visFilt='all';
  document.querySelectorAll('#app-filters .fb').forEach(b=>b.classList.remove('on'));
  const allBtn=document.querySelector('#app-filters .fb');if(allBtn)allBtn.classList.add('on');
  ['vfAll','vfPub','vfPriv'].forEach(id=>document.getElementById(id)?.classList.remove('on-all','on-pub','on-priv'));
  document.getElementById('vfAll')?.classList.add('on-all');
  await updateAIMemory(note);
}
// ============================================================
async function toggleNoteVisibility(fbKey,currentIsPublic,e){
  if(e)e.stopPropagation();
  const newVal=!currentIsPublic;
  if(window._db&&window._update&&window._ref&&fbKey){
    try{await window._update(window._ref(window._db,`notes/${fbKey}`),{isPublic:newVal});showToast(newVal?'🌐 Set to Public':'🔒 Set to Private');}
    catch(err){console.error(err);showToast('⚠️ Update failed');}
  }else{
    const n=window.allNotes.find(x=>x.fbKey===fbKey);
    if(n){n.isPublic=newVal;renderApp();}
    showToast(newVal?'🌐 Set to Public':'🔒 Set to Private');
  }
}

// ============================================================
// DELETE
// ============================================================
async function delNote(fbKey,id,e){
  if(e)e.stopPropagation();
  // Hard ownership guard — even if called directly
  const _n=window.allNotes.find(x=>(x.fbKey===fbKey||String(x.id)===String(id)));
  if(_n&&!isMyNote(_n)){showToast('⚠️ Hindi mo ma-delete ang notes ng iba.');return;}
  if(!confirm('Delete this note?'))return;
  closeView();
  if(window._db&&window._remove&&window._ref&&fbKey){
    try{await window._remove(window._ref(window._db,`notes/${fbKey}`));showToast('🗑️ Deleted');}
    catch(err){console.error(err);}
  }else{window.allNotes=window.allNotes.filter(n=>n.id!==id);renderApp();showToast('🗑️ Deleted');}
}

// ============================================================
// RENDER — My Notes + Community Notes separated
// ============================================================
function buildAppFilters(){
  const cats=[...new Set(window.allNotes.map(n=>n.category).filter(Boolean))].sort();
  const wrap=document.getElementById('app-filters');
  wrap.innerHTML=`<button class="fb ${appFilt==='ALL'?'on':''}" onclick="setAppF('ALL',this)">All</button>`;
  cats.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='fb'+(appFilt===c?' on':'');
    btn.textContent=getCatEmoji(c)+' '+c;
    btn.onclick=function(){setAppF(c,this);};
    wrap.appendChild(btn);
  });
}

function buildCard(n,mine){
  const isPub=n.isPublic===true;
  const isOff=!!n._offline;
  const thumb=n.source==='img'&&n.imageData
    ?`<div style="margin:-18px -18px 14px;border-bottom:1px solid var(--border);overflow:hidden;border-radius:var(--r) var(--r) 0 0"><img src="data:image/jpeg;base64,${n.imageData}" style="width:100%;height:90px;object-fit:cover;display:block;${isOff?'opacity:0.65':''}" loading="lazy"></div>`
    :'';
  const badge=mine&&!isOff
    ?`<span class="vis-badge ${isPub?'pub':'priv'} toggle" title="Toggle visibility" onclick="toggleNoteVisibility('${n.fbKey||''}',${isPub},event)">${isPub?'🌐':'🔒'}</span>`
    :'';
  const offpill=isOff?`<span class="offline-pill">⏳ AI queued</span>`:'';
  const btns=mine&&!isOff
    ?`<button class="anc-btn edit-b" onclick="event.stopPropagation();openEdit('${n.fbKey||n.id}')">✏️</button><button class="anc-btn del" onclick="event.stopPropagation();delNote('${n.fbKey||''}',${n.id},event)">🗑️</button>`
    :'';
  const cls=`anc${mine?'':' community'}${isOff?' _offline-card':''}`;
  const clk=isOff?`showToast('⏳ Queued — AI mag-process pag online na')`:`openView('${n.fbKey||n.id}')`;
  return`<div class="${cls}" onclick="${clk}">
    <div class="nc-stripe" style="background:${isOff?'linear-gradient(90deg,#d97706,#fbbf24)':getCatStripe(n.category)}"></div>
    ${thumb}
    <div class="nc-top">
      <span ${getCatPill(isOff?'OTHER':n.category)}>${isOff?'⏳':getCatEmoji(n.category)} ${isOff?'QUEUED':n.category}</span>
      <span class="nc-date">${n.date||''}${n.time ? ' · ' + n.time : ''}</span>
      ${badge}${offpill}
    </div>
    <div class="nc-title">${esc(displayTitle(n))}</div>
    <div class="nc-summary">${esc(n._offline?'Waiting for AI to organize...':displaySummary(n))}</div>
    <div class="anc-foot">
      <div class="anc-src">${n.source==='img'?'🖼️':'📄'} ${n.author?esc(n.author):''}</div>
      <div class="anc-btns">${btns}</div>
    </div>
  </div>`;
}


function toggleFilterDropdown(e){
  if(e) e.stopPropagation();
  filterDropdownOpen = !filterDropdownOpen;
  const dd = document.getElementById('filter-dropdown');
  const btn = document.getElementById('filter-btn');
  if(filterDropdownOpen){
    dd.style.display='flex';
    btn.style.borderColor='var(--a)';
    btn.style.color='var(--a2)';
    buildFilterDropdownCats();
    setTimeout(function(){
      document.addEventListener('click', closeFilterOnOutside);
    }, 10);
  } else {
    dd.style.display='none';
    btn.style.borderColor='';
    btn.style.color='';
    document.removeEventListener('click', closeFilterOnOutside);
  }
}

function closeFilterOnOutside(e){
  const dd = document.getElementById('filter-dropdown');
  const btn = document.getElementById('filter-btn');
  if(!dd.contains(e.target) && !btn.contains(e.target)){
    filterDropdownOpen = false;
    dd.style.display='none';
    btn.style.borderColor='';
    btn.style.color='';
    document.removeEventListener('click', closeFilterOnOutside);
  }
}

function buildFilterDropdownCats(){
  const cats = [...new Set(window.allNotes.map(n=>n.category).filter(Boolean))].sort();
  const wrap = document.getElementById('fd-cats');
  wrap.innerHTML = cats.map(c=>
    `<button class="fd-pill${activeCatFilters.has(c)?' on':''}" onclick="toggleCatFilter('${c}')">${getCatEmoji(c)} ${c}</button>`
  ).join('');
}

function toggleCatFilter(cat){
  if(activeCatFilters.has(cat)) activeCatFilters.delete(cat);
  else activeCatFilters.add(cat);
  buildFilterDropdownCats();
  updateFilterCount();
  renderApp();
}

function toggleSourceFilter(src){
  sourceFilter = sourceFilter === src ? null : src;
  document.getElementById('fd-text').classList.toggle('on', sourceFilter==='text');
  document.getElementById('fd-img').classList.toggle('on', sourceFilter==='img');
  updateFilterCount();
  renderApp();
}

function toggleVisFilter(vis){
  visFilt = visFilt === vis ? 'all' : vis;
  document.getElementById('fd-pub').classList.toggle('on', visFilt==='public');
  document.getElementById('fd-priv').classList.toggle('on', visFilt==='private');
  updateFilterCount();
  renderApp();
}

function clearAllFilters(){
  activeCatFilters.clear();
  sourceFilter = null;
  visFilt = 'all';
  appFilt = 'ALL';
  document.getElementById('fd-text').classList.remove('on');
  document.getElementById('fd-img').classList.remove('on');
  document.getElementById('fd-pub').classList.remove('on');
  document.getElementById('fd-priv').classList.remove('on');
  updateFilterCount();
  renderApp();
}

function updateFilterCount(){
  const total = activeCatFilters.size + (sourceFilter?1:0) + (visFilt!=='all'?1:0);
  const badge = document.getElementById('filter-count');
  const btn = document.getElementById('filter-btn');
  if(total > 0){
    badge.style.display='inline';
    badge.textContent=total;
    btn.style.borderColor='var(--a)';
    btn.style.color='var(--a2)';
  } else {
    badge.style.display='none';
    btn.style.borderColor='';
    btn.style.color='';
  }
}


function renderApp(){
  buildAppFilters();
  let list=appFilt==='ALL'?[...window.allNotes]:window.allNotes.filter(n=>n.category===appFilt);
  if(visFilt==='public')list=list.filter(n=>n.isPublic===true);
  else if(visFilt==='private')list=list.filter(n=>n.isPublic!==true);
  if(activeCatFilters.size > 0) list=list.filter(n=>activeCatFilters.has(n.category));
  if(sourceFilter) list=list.filter(n=>n.source===sourceFilter);
  if(searchQ)list=list.filter(n=>[n.title,n.summary,n.organizedContent,n.category].some(s=>(s||'').toLowerCase().includes(searchQ)));

  const myNotes=list.filter(n=>isMyNote(n));
  const community=list.filter(n=>!isMyNote(n)&&n.isPublic===true);

  // Update tab counts
  const mc=document.getElementById('mtab-mine-cnt');const cc=document.getElementById('mtab-com-cnt');
  if(mc)mc.textContent=myNotes.length?myNotes.length:'';
  if(cc)cc.textContent=community.length?community.length:'';

  // Update Shared With Me count
  var sharedWithMe=(window.allNotes||[]).filter(function(n){
    var me=window._currentUser;
    return me&&n.sharedWith&&n.sharedWith[me.uid]&&!isMyNote(n);
  }).length;
  var sharedByMe=(window.allNotes||[]).filter(function(n){
    return isMyNote(n)&&n.sharedWith&&Object.keys(n.sharedWith).length>0;
  }).length;
  var sc=document.getElementById('mtab-shared-cnt');
  var smc=document.getElementById('mtab-sharedme-cnt');
  if(sc)sc.textContent=sharedWithMe||'';
  if(smc)smc.textContent=sharedByMe||'';

  const secMy=document.getElementById('sec-my');
  const secCom=document.getElementById('sec-community');

  if(myNotes.length===0){
    secMy.innerHTML=`<div class="empty"><div class="empty-ico">${searchQ?'🔍':'📋'}</div><div class="empty-t">${searchQ?'Walang nahanap':'Wala ka pang notes'}</div><div class="empty-s">${searchQ?'Try different keywords':'I-paste ang notes at i-organize!'}</div></div>`;
  }else{
    secMy.innerHTML=`<div class="app-grid">${myNotes.map(n=>buildCard(n,true)).join('')}</div>`;
  }

  if(community.length===0){
    secCom.innerHTML=`<div class="empty"><div class="empty-ico">🌐</div><div class="empty-t">Walang community notes</div><div class="empty-s">I-set ang iyong notes sa Public para makita ng iba</div></div>`;
  }else{
    secCom.innerHTML=`<div class="app-grid">${community.map(n=>buildCard(n,false)).join('')}</div>`;
  }
}

function str(v){if(v==null)return'';if(typeof v==='string')return v;if(Array.isArray(v))return v.map(str).join('\n');if(typeof v==='object')return JSON.stringify(v);return String(v);}
function esc(s){return str(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function displayTitle(n){
  const t=str(n.title).trim();
  if(['','walang laman','untitled','no title'].includes(t.toLowerCase())){
    const raw=str(n.rawNote).trim();
    if(raw&&raw!=='[image]')return raw.split('\n')[0].slice(0,60);
  }
  return t||'Untitled';
}
function displaySummary(n){
  const kps=Array.isArray(n.keyPoints)?n.keyPoints:[];
  const first=kps.map(k=>str(k).trim()).find(k=>k.length>0&&k.length<120);
  if(first)return first;
  const s=str(n.summary).trim();
  if(!['','walang mahalagang impormasyon','walang laman','no summary','n/a'].includes(s.toLowerCase())&&s)return s.slice(0,120);
  const raw=str(n.rawNote).trim();
  if(raw&&raw!=='[image]'){const lines=raw.split('\n').filter(l=>l.trim());return lines[0].slice(0,100);}
  return'';
}
function setAppF(f,btn){appFilt=f;document.querySelectorAll('#app-filters .fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderApp();}
function doSearch(v){searchQ=v.toLowerCase();renderApp();}


// ============================================================
// UTILS
// ============================================================
function doSignOut(){if(!confirm('Sign out?'))return;window._signOut().then(()=>window.location.href='index.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3200);}

/* PWA */
function showStrip(){document.getElementById('install-strip').classList.add('show');}
function hideStrip(){document.getElementById('install-strip').classList.remove('show');}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!sessionStorage.getItem('installDismissed'))showStrip();});
async function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;hideStrip();}
  else{showToast(/iPhone|iPad|iPod/i.test(navigator.userAgent)?'📲 Tap Share → Add to Home Screen':'📲 Open browser menu → Install App');setTimeout(hideStrip,500);}
}
function dismissInstall(){sessionStorage.setItem('installDismissed','1');hideStrip();}
(function(){
  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  if(isMobile&&!isStandalone&&!sessionStorage.getItem('installDismissed'))setTimeout(showStrip,1500);
})();
window.addEventListener('appinstalled',()=>{showToast('✦ App installed!');hideStrip();});
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('[App] SW registered, scope:', reg.scope);

    // Force new SW to activate immediately on update
    if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if(!nw) return;
      nw.addEventListener('statechange', () => {
        if(nw.state === 'installed' && navigator.serviceWorker.controller) {
          nw.postMessage({type:'SKIP_WAITING'});
        }
      });
    });

    // Listen for sync trigger from SW
    navigator.serviceWorker.addEventListener('message', e => {
      if(e.data?.type === 'SYNC_NOTES' && typeof window._syncQueue === 'function'){
        window._syncQueue();
      }
    });

    // Register background sync
    if('sync' in reg && navigator.onLine){
      reg.sync.register('sync-notes').catch(()=>{});
    }
  }).catch(err => console.warn('[App] SW registration failed:', err));
}

renderApp();
</script>
