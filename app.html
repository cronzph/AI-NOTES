<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Notes AI — App</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  async function initFirebase() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) throw new Error('Config fetch failed');
      const { firebase } = await res.json();
      const app = initializeApp(firebase);
      const db = getDatabase(app);
      const auth = getAuth(app);
      window._db = db; window._auth = auth;
      window._ref = ref; window._push = push; window._remove = remove;
      window._signOut = () => signOut(auth);

      onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        window._currentUser = user;
        const initials = (user.displayName || user.email || '?')[0].toUpperCase();
        document.getElementById('user-av').textContent = initials;
        document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
      });

      const notesRef = ref(db, 'notes');
      onValue(notesRef, snap => {
        const data = snap.val();
        window.allNotes = data
          ? Object.entries(data).map(([fbKey,v]) => ({fbKey,...v})).sort((a,b) => b.id - a.id)
          : [];
        renderApp();
      });
    } catch(err) {
      console.error(err);
      window.location.href = 'auth.html';
    }
  }
  initFirebase();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050810;--bg2:#07091a;--surface:#0c1022;--surface2:#10162e;--surface3:#151e3f;
  --border:rgba(59,130,246,0.1);--border-h:rgba(59,130,246,0.28);
  --text:#7a9ac7;--text-b:#ddeeff;--text-m:#2e4470;
  --a:#3b82f6;--a2:#60a5fa;--ag:rgba(59,130,246,0.13);--ag2:rgba(59,130,246,0.06);
  --cyan:#22d3ee;--red:#f87171;--r:16px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);top:-250px;right:-150px;animation:orb 14s ease-in-out infinite alternate}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(34,211,238,0.04) 0%,transparent 70%);bottom:-150px;left:-100px;animation:orb 18s ease-in-out infinite alternate-reverse}
@keyframes orb{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,-30px) scale(1.1)}}

/* INSTALL STRIP */
#install-strip{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(90deg,#0d1f4e,#0c1022);border-bottom:1px solid var(--border-h);padding:10px 16px;align-items:center;justify-content:space-between;gap:10px}
#install-strip.show{display:flex}
.s-left{display:flex;align-items:center;gap:10px}
.s-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-title{font-size:13px;font-weight:700;color:var(--text-b)}
.s-sub{font-size:11px;color:var(--text-m);margin-top:1px}
.s-btns{display:flex;gap:6px;flex-shrink:0}
.s-dismiss{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-m);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;font-family:'Outfit',sans-serif}
.s-install{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}

/* APP HEADER */
.app-nav{
  position:relative;z-index:50;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;gap:10px;
  background:rgba(5,8,16,0.94);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--text-b);letter-spacing:-0.5px;text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 14px rgba(59,130,246,0.4);animation:lgo 3s ease-in-out infinite}
@keyframes lgo{0%,100%{box-shadow:0 0 12px rgba(59,130,246,0.4)}50%{box-shadow:0 0 26px rgba(59,130,246,0.65)}}

.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;flex:1;max-width:280px;transition:all 0.2s}
.search-wrap:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.search-wrap svg{color:var(--text-m);flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;color:var(--text-b);font-family:'Outfit',sans-serif;font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text-m)}

.user-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-b);cursor:pointer;transition:all 0.2s;flex-shrink:0}
.user-pill:hover{border-color:var(--border-h)}
.user-avatar{width:22px;height:22px;background:linear-gradient(135deg,#3b82f6,#22d3ee);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}

/* LAYOUT */
.app-body{flex:1;display:grid;grid-template-columns:320px 1fr;min-height:0;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.tab-switch{display:flex;padding:10px 12px;gap:5px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.tab-btn{flex:1;padding:8px;border-radius:var(--rs);border:1px solid transparent;background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.active{background:var(--ag);border-color:var(--border-h);color:var(--a2)}

.txt-sec,.img-sec{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;overflow:hidden;min-height:0}
.hidden{display:none!important}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-m);font-family:'JetBrains Mono',monospace;flex-shrink:0}

textarea.ti{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-b);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;padding:12px 13px;resize:none;outline:none;transition:all 0.2s;min-height:0;scrollbar-width:thin}
textarea.ti:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag);background:var(--surface3)}
textarea.ti::placeholder{color:var(--text-m);font-size:11.5px}

.paste-tip{display:flex;align-items:center;gap:8px;background:var(--ag2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);flex-shrink:0}
.paste-tip kbd{background:var(--surface2);border:1px solid var(--border-h);border-radius:5px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--a2)}

.dropzone{flex:1;border:2px dashed var(--border-h);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;background:var(--surface2);min-height:80px}
.dropzone:hover,.dropzone.over{border-color:var(--a);background:var(--ag)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz-ico{font-size:26px;opacity:0.2}
.dz-txt{font-size:12px;color:var(--text-m);text-align:center}
.dz-txt b{color:var(--a2)}

.img-prev{border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);display:none;flex-shrink:0}
.img-prev img{width:100%;max-height:120px;object-fit:cover;display:block}
.img-prev-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface2);font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}
.rm-btn{cursor:pointer;color:var(--red);font-size:11px}

/* AI CATEGORY INDICATOR */
.ai-cat-hint{display:none;align-items:center;gap:8px;background:var(--ag2);border:1px solid var(--border-h);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--a2);flex-shrink:0;animation:fadeIn 0.3s ease}
.ai-cat-hint.show{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ai-cat-hint .ai-ico{font-size:14px;flex-shrink:0}

.proc-area{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.proc-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 18px rgba(59,130,246,0.3);position:relative;overflow:hidden}
.proc-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%)}
.proc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(59,130,246,0.45)}
.proc-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}

.lbar{display:none}
.lbar.on{display:block}
.lbar-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.lbar-fill{height:100%;background:linear-gradient(90deg,transparent,var(--a2),var(--cyan),transparent);animation:ls 1.8s ease-in-out infinite}
@keyframes ls{0%{transform:translateX(-100%) scaleX(0.4)}100%{transform:translateX(200%) scaleX(0.4)}}
.lbar-txt{font-size:11px;color:var(--a2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-align:center;margin-top:6px;animation:blk 1s ease-in-out infinite alternate}
@keyframes blk{from{opacity:0.4}to{opacity:1}}

/* MAIN */
.main-content{overflow-y:auto;padding:16px;background:var(--bg2)}
.main-content::-webkit-scrollbar{width:4px}
.main-content::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fb:hover{border-color:var(--border-h);color:var(--text)}
.fb.on{background:var(--ag);border-color:var(--border-h);color:var(--a2)}

.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(220px,28vw,270px),1fr));gap:12px}

/* NOTE CARD */
.anc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);animation:cin 0.3s ease both;cursor:pointer}
@keyframes cin{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none}}
.anc:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.3)}
.nc-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.nc-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cpill{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:3px 9px;border-radius:6px;white-space:nowrap}
.nc-date{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace}
.nc-title{font-size:14px;font-weight:700;color:var(--text-b);line-height:1.3;margin-bottom:7px}
.nc-summary{font-size:12.5px;color:var(--text);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.anc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;margin-top:10px;border-top:1px solid var(--border)}
.anc-src{font-size:11px;color:var(--text-m);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px}
.anc-btns{display:flex;gap:5px}
.anc-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.anc-btn:hover{border-color:var(--a);color:var(--a2)}
.anc-btn.del:hover{border-color:rgba(248,113,113,0.4);color:var(--red)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-h);border-radius:20px;padding:clamp(20px,4vw,28px);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;animation:min 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 24px 80px rgba(0,0,0,0.55)}
@keyframes min{from{opacity:0;transform:scale(0.92) translateY(18px)}to{opacity:1;transform:none}}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.modal-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.modal-t{font-size:18px;font-weight:800;color:var(--text-b);line-height:1.2}
.modal-x{width:32px;height:32px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text-m)}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.ms{margin-bottom:18px}
.ms-l{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a2);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.ms-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:13px;font-size:13px;color:var(--text);line-height:1.75}
.kps{display:flex;flex-direction:column;gap:7px}
.kp{display:flex;gap:9px;font-size:13px;color:var(--text);line-height:1.5}
.kp::before{content:'→';color:var(--a2);flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-h);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-b);z-index:400;display:none;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,0.45);animation:tpop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes tpop{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* CATEGORY COLORS */
.cIT{background:rgba(59,130,246,0.12);color:#60a5fa}
.cSTUDY{background:rgba(34,211,238,0.1);color:#22d3ee}
.cFREELANCE{background:rgba(251,191,36,0.1);color:#fbbf24}
.cCRYPTO{background:rgba(251,146,60,0.1);color:#fb923c}
.cPERSONAL{background:rgba(129,140,248,0.1);color:#818cf8}
.cOTHER{background:rgba(148,163,184,0.1);color:#94a3b8}

.empty{grid-column:1/-1;padding:60px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-ico{font-size:36px;opacity:0.15}
.empty-t{font-size:16px;font-weight:800;color:var(--text-m)}
.empty-s{font-size:12px;color:var(--text-m);opacity:0.5}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}

/* MOBILE */
@media(max-width:768px){
  html,body{height:auto;overflow:auto}
  .app-body{grid-template-columns:1fr;overflow:visible}
  .sidebar{height:auto;max-height:55vh;border-right:none;border-bottom:1px solid var(--border)}
  .txt-sec,.img-sec{max-height:35vh}
  textarea.ti{min-height:110px}
  .main-content{min-height:50vh;overflow:visible}
  .app-grid{grid-template-columns:1fr}
  .user-uname,.user-out{display:none}
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- INSTALL STRIP -->
<div id="install-strip">
  <div class="s-left">
    <div class="s-icon">✦</div>
    <div>
      <div class="s-title">Install Notes AI</div>
      <div class="s-sub">I-add sa Home Screen para mas mabilis</div>
    </div>
  </div>
  <div class="s-btns">
    <button class="s-dismiss" onclick="dismissInstall()">Later</button>
    <button class="s-install" onclick="installApp()">📲 Install</button>
  </div>
</div>

<!-- APP NAV -->
<nav class="app-nav">
  <a class="logo" href="index.html">
    <div class="logo-mark">✦</div>
    <span>Notes AI</span>
  </a>
  <div class="search-wrap">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search notes..." oninput="doSearch(this.value)">
  </div>
  <div class="user-pill" onclick="doSignOut()">
    <div class="user-avatar" id="user-av">?</div>
    <span id="user-name" class="user-uname" style="max-width:80px;overflow:hidden;text-overflow:ellipsis">User</span>
    <span class="user-out" style="color:var(--text-m);font-size:11px">· Out</span>
  </div>
</nav>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="tab-switch">
      <button class="tab-btn active" id="tbText" onclick="switchTab('text')">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Text
      </button>
      <button class="tab-btn" id="tbImg" onclick="switchTab('img')">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Image
      </button>
    </div>

    <div class="txt-sec" id="txtSec">
      <div class="sec-lbl">Your notes</div>
      <textarea class="ti" id="txtArea" placeholder="I-paste mo dito ang notes mo...

Pwedeng:
• Raw class notes
• Ideas at plans
• Code snippets
• Reminders
• Kahit ano!

Bahala na si AI mag-organize at mag-detect ng category 😄"></textarea>
    </div>

    <div class="img-sec hidden" id="imgSec">
      <div class="paste-tip">📋 Press <kbd>Ctrl+V</kbd> to paste image</div>
      <div class="dropzone" id="dz">
        <input type="file" accept="image/*" id="fi" onchange="onFile(event)">
        <div class="dz-ico">🖼️</div>
        <div class="dz-txt">Drop image or <b>tap to browse</b></div>
      </div>
      <div class="img-prev" id="ip">
        <img id="pimg" src="" alt="">
        <div class="img-prev-bar">
          <span id="pname">image.png</span>
          <span class="rm-btn" onclick="clearImg()">✕ Remove</span>
        </div>
      </div>
    </div>

    <!-- AI will auto-detect category, just a hint display -->
    <div class="ai-cat-hint" id="catHint">
      <span class="ai-ico">🤖</span>
      <span id="catHintText">AI will auto-detect category</span>
    </div>

    <div class="proc-area">
      <div class="lbar" id="lbar">
        <div class="lbar-track"><div class="lbar-fill"></div></div>
        <div class="lbar-txt" id="lbar-txt">AI is thinking...</div>
      </div>
      <button class="proc-btn" id="pb" onclick="process()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Organize with AI
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="filters" id="app-filters">
      <button class="fb on" onclick="setAppF('ALL',this)">All</button>
    </div>
    <div class="app-grid" id="app-grid"></div>
  </main>

</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-h">
      <div class="modal-t" id="mt"></div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div id="mb"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GROQ_URL = '/api/groq';
window.allNotes = window.allNotes || [];
let appFilt = 'ALL', searchQ = '';
let b64 = null, tab = 'text';
let deferredPrompt = null;

// ===== CATEGORY CONFIG (AI generates freely, these just define styling) =====
const knownCats = {
  IT:    { stripe:'linear-gradient(90deg,#3b82f6,#60a5fa)', pill:'cIT',    emoji:'💻' },
  STUDY: { stripe:'linear-gradient(90deg,#22d3ee,#67e8f9)', pill:'cSTUDY', emoji:'📚' },
  FREELANCE:{ stripe:'linear-gradient(90deg,#fbbf24,#fde68a)', pill:'cFREELANCE', emoji:'💼' },
  CRYPTO:{ stripe:'linear-gradient(90deg,#fb923c,#fed7aa)', pill:'cCRYPTO', emoji:'₿' },
  PERSONAL:{ stripe:'linear-gradient(90deg,#818cf8,#c4b5fd)', pill:'cPERSONAL', emoji:'🙋' },
  OTHER: { stripe:'linear-gradient(90deg,#94a3b8,#cbd5e1)', pill:'cOTHER',  emoji:'📌' },
};

// Dynamic colors for AI-generated categories not in knownCats
const dynColors = [
  'linear-gradient(90deg,#34d399,#6ee7b7)',
  'linear-gradient(90deg,#f472b6,#fbcfe8)',
  'linear-gradient(90deg,#a78bfa,#ddd6fe)',
  'linear-gradient(90deg,#fb7185,#fda4af)',
  'linear-gradient(90deg,#38bdf8,#bae6fd)',
];
const dynPillColors = [
  'background:rgba(52,211,153,0.1);color:#34d399',
  'background:rgba(244,114,182,0.1);color:#f472b6',
  'background:rgba(167,139,250,0.1);color:#a78bfa',
  'background:rgba(251,113,133,0.1);color:#fb7185',
  'background:rgba(56,189,248,0.1);color:#38bdf8',
];
const catColorCache = {};
let colorIdx = 0;

function getCatStyle(cat) {
  if (knownCats[cat]) return knownCats[cat];
  if (!catColorCache[cat]) {
    catColorCache[cat] = {
      stripe: dynColors[colorIdx % dynColors.length],
      pillStyle: dynPillColors[colorIdx % dynPillColors.length],
      emoji: '🏷️',
    };
    colorIdx++;
  }
  return catColorCache[cat];
}

function getCatStripe(cat) { return getCatStyle(cat).stripe; }
function getCatPill(cat) {
  const s = getCatStyle(cat);
  if (s.pill) return `class="cpill ${s.pill}"`;
  return `class="cpill" style="${s.pillStyle}"`;
}
function getCatEmoji(cat) { return getCatStyle(cat).emoji || '🏷️'; }

// ===== AI PROMPT — category is fully open-ended, AI decides =====
const SYS_PROMPT = `Ikaw ay isang expert notes organizer. Mag-return ng PURE JSON ONLY — walang markdown backticks, walang preamble, walang explanation. Format:
{
  "title": "Maikling title, max 10 words",
  "category": "Isang salita lang, UPPERCASE. Piliin ang pinaka-angkop: IT, STUDY, FREELANCE, CRYPTO, PERSONAL, HEALTH, BUSINESS, DESIGN, LANGUAGE, FOOD, TRAVEL, FINANCE, SCIENCE, ART, o anumang relevant na category na ikaw mismo mag-decide",
  "summary": "2-3 sentence Taglish summary ng content",
  "keyPoints": ["point 1", "point 2", "point 3"],
  "organizedContent": "Full organized notes. Gumamit ng ## para sa headers at • para sa bullets. Taglish."
}
RULES: category ay laging isang salita UPPERCASE. Huwag gumamit ng OTHER maliban kung talagang walang angkop. Mag-isip ng pinaka-specific na category para sa content.`;

// ===== INPUT =====
function switchTab(t) {
  tab = t;
  document.getElementById('tbText').classList.toggle('active', t==='text');
  document.getElementById('tbImg').classList.toggle('active', t==='img');
  document.getElementById('txtSec').classList.toggle('hidden', t!=='text');
  document.getElementById('imgSec').classList.toggle('hidden', t!=='img');
}

function onFile(e) { const f=e.target.files[0]; if(f) loadImg(f); }
function loadImg(file) {
  const r = new FileReader();
  r.onload = ev => {
    b64 = ev.target.result.split(',')[1];
    document.getElementById('pimg').src = ev.target.result;
    document.getElementById('pname').textContent = file.name;
    document.getElementById('ip').style.display = 'block';
    document.getElementById('dz').style.display = 'none';
  };
  r.readAsDataURL(file);
}
function clearImg() {
  b64 = null;
  document.getElementById('ip').style.display = 'none';
  document.getElementById('dz').style.display = 'flex';
  document.getElementById('fi').value = '';
}

const dz = document.getElementById('dz');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', ()=>dz.classList.remove('over'));
dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('over'); const f=e.dataTransfer.files[0]; if(f?.type.startsWith('image/')) loadImg(f); });
document.addEventListener('paste', e=>{
  for (const item of e.clipboardData?.items||[]) {
    if (item.type.startsWith('image/')) {
      const f=item.getAsFile(); if(!f) continue;
      switchTab('img'); loadImg(f); showToast('📋 Image pasted!'); break;
    }
  }
});

// Hint: show AI will auto-detect
document.getElementById('catHint').classList.add('show');

// ===== PROCESS =====
async function process() {
  if (!window._currentUser) { showToast('⚠️ Log in first!'); return; }
  if (tab==='text') {
    const t = document.getElementById('txtArea').value.trim();
    if (!t) return showToast('⚠️ Mag-paste muna ng notes!');
    await callGroq(t);
  } else {
    if (!b64) return showToast('⚠️ Mag-upload muna ng image!');
    await callGroqVision(b64);
  }
}

function setLoading(on, msg='AI is thinking...') {
  const btn=document.getElementById('pb'), bar=document.getElementById('lbar');
  btn.disabled=on; btn.style.display=on?'none':'flex';
  bar.classList.toggle('on',on);
  document.getElementById('lbar-txt').textContent = msg;
}

async function callGroq(text) {
  setLoading(true, 'AI is organizing...');
  try {
    const res = await fetch(GROQ_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'llama-3.3-70b-versatile', max_tokens:1500, messages:[{role:'system',content:SYS_PROMPT},{role:'user',content:'I-organize ang notes na ito:\n\n'+text}] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.choices[0].message.content.replace(/```json|```/g,'').trim();
    const p = JSON.parse(raw);
    await saveNote(p, 'text');
    document.getElementById('txtArea').value = '';
    showToast(`✦ Saved as [${p.category}]`);
  } catch(err) { console.error(err); showToast('⚠️ '+err.message); }
  setLoading(false);
}

async function callGroqVision(imgB64) {
  setLoading(true, 'AI is reading image...');
  try {
    const res = await fetch(GROQ_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'meta-llama/llama-4-scout-17b-16e-instruct', max_tokens:1500, messages:[{role:'user',content:[{type:'image_url',image_url:{url:`data:image/jpeg;base64,${imgB64}`}},{type:'text',text:SYS_PROMPT+'\n\nBasahin at i-organize ang notes sa image.'}]}] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.choices[0].message.content.replace(/```json|```/g,'').trim();
    const p = JSON.parse(raw);
    await saveNote(p, 'img');
    clearImg(); showToast(`✦ Image saved as [${p.category}]`);
  } catch(err) { console.error(err); showToast('⚠️ '+err.message); }
  setLoading(false);
}

async function saveNote(p, source) {
  const note = {
    id: Date.now(),
    title: p.title||'Untitled',
    category: (p.category||'OTHER').toUpperCase().replace(/\s+/g,'_'),
    summary: p.summary||'',
    keyPoints: p.keyPoints||[],
    organizedContent: p.organizedContent||'',
    source,
    date: new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}),
    author: window._currentUser?.displayName || window._currentUser?.email || 'Anonymous',
  };
  if (window._db && window._push && window._ref) {
    try { await window._push(window._ref(window._db,'notes'), note); }
    catch(e) { console.error(e); window.allNotes.unshift(note); renderApp(); }
  } else { window.allNotes.unshift(note); renderApp(); }
}

async function delNote(id, fbKey, e) {
  e.stopPropagation();
  if (!confirm('Delete this note?')) return;
  if (window._db && window._remove && window._ref && fbKey) {
    try { await window._remove(window._ref(window._db,`notes/${fbKey}`)); showToast('🗑️ Deleted'); }
    catch(err) { console.error(err); }
  } else { window.allNotes=window.allNotes.filter(n=>n.id!==id); renderApp(); showToast('🗑️ Deleted'); }
}

// ===== RENDER =====
function buildAppFilters() {
  const cats = [...new Set(window.allNotes.map(n=>n.category).filter(Boolean))].sort();
  const wrap = document.getElementById('app-filters');
  wrap.innerHTML = `<button class="fb ${appFilt==='ALL'?'on':''}" onclick="setAppF('ALL',this)">All</button>`;
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'fb' + (appFilt===c?' on':'');
    btn.textContent = getCatEmoji(c)+' '+c;
    btn.onclick = function(){ setAppF(c, this); };
    wrap.appendChild(btn);
  });
}

function renderApp() {
  buildAppFilters();
  const g = document.getElementById('app-grid'); if(!g) return;
  let list = appFilt==='ALL' ? [...window.allNotes] : window.allNotes.filter(n=>n.category===appFilt);
  if (searchQ) list = list.filter(n=>[n.title,n.summary,n.organizedContent,n.category].some(s=>(s||'').toLowerCase().includes(searchQ)));
  if (!list.length) {
    g.innerHTML=`<div class="empty"><div class="empty-ico">${searchQ?'🔍':'📋'}</div><div class="empty-t">${searchQ?'Walang nahanap':'No notes yet'}</div><div class="empty-s">${searchQ?`No results for "${searchQ}"`:'I-paste ang iyong notes sa left!'}</div></div>`;
    return;
  }
  g.innerHTML = list.map(n => `
    <div class="anc" onclick="openNote('${n.fbKey||n.id}')">
      <div class="nc-stripe" style="background:${getCatStripe(n.category)}"></div>
      <div class="nc-top">
        <span ${getCatPill(n.category)}>${getCatEmoji(n.category)} ${n.category}</span>
        <span class="nc-date">${n.date||''}</span>
      </div>
      <div class="nc-title">${esc(n.title)}</div>
      <div class="nc-summary">${esc(n.summary)}</div>
      <div class="anc-foot">
        <div class="anc-src">${n.source==='img'?'🖼️':'📄'} ${n.source==='img'?'Image':'Text'}${n.author?` · ${esc(n.author)}`:''}</div>
        <div class="anc-btns">
          <button class="anc-btn" onclick="event.stopPropagation();openNote('${n.fbKey||n.id}')">View</button>
          <button class="anc-btn del" onclick="delNote(${n.id},'${n.fbKey||''}',event)">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setAppF(f, btn) { appFilt=f; document.querySelectorAll('#app-filters .fb').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderApp(); }
function doSearch(v) { searchQ=v.toLowerCase(); renderApp(); }

// ===== MODAL =====
function openNote(key) {
  const n = window.allNotes.find(x=>(x.fbKey===key||String(x.id)===String(key))); if(!n) return;
  document.getElementById('mt').textContent = n.title;
  const fmt = (n.organizedContent||'')
    .replace(/##\s(.+)/g,'<div style="font-size:14px;font-weight:800;color:var(--text-b);margin:16px 0 7px;border-bottom:1px solid var(--border);padding-bottom:6px">$1</div>')
    .replace(/•\s(.+)/g,'<div style="display:flex;gap:9px;margin:5px 0;font-size:13px"><span style="color:var(--a2);flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/\n/g,'<br>');
  document.getElementById('mb').innerHTML = `
    <div style="margin-bottom:14px">
      <span ${getCatPill(n.category)} style="font-size:12px">${getCatEmoji(n.category)} ${n.category}</span>
    </div>
    <div class="ms"><div class="ms-l">Summary</div><div class="ms-box">${esc(n.summary)}</div></div>
    ${n.keyPoints?.length?`<div class="ms"><div class="ms-l">Key Points</div><div class="kps">${n.keyPoints.map(p=>`<div class="kp">${esc(p)}</div>`).join('')}</div></div>`:''}
    <div class="ms"><div class="ms-l">Organized Notes</div><div class="ms-box" style="white-space:normal">${fmt}</div></div>`;
  document.getElementById('ov').classList.add('on');
}

function closeModal() { document.getElementById('ov').classList.remove('on'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function doSignOut() {
  if (!confirm('Sign out?')) return;
  window._signOut().then(()=>window.location.href='index.html');
}

// ===== TOAST =====
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3000);
}

// ===== PWA =====
function showStrip(){ document.getElementById('install-strip').classList.add('show'); }
function hideStrip(){ document.getElementById('install-strip').classList.remove('show'); }
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; if(!sessionStorage.getItem('installDismissed')) showStrip(); });
async function installApp(){
  if(deferredPrompt){ deferredPrompt.prompt(); const{outcome}=await deferredPrompt.userChoice; deferredPrompt=null; hideStrip(); }
  else{ showToast(/iPhone|iPad|iPod/i.test(navigator.userAgent)?'📲 Tap Share → Add to Home Screen':'📲 Open browser menu → Install App'); setTimeout(hideStrip,500); }
}
function dismissInstall(){ sessionStorage.setItem('installDismissed','1'); hideStrip(); }
(function(){ const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent); const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone; if(isMobile&&!isStandalone&&!sessionStorage.getItem('installDismissed')) setTimeout(showStrip,1500); })();
window.addEventListener('appinstalled',()=>{ showToast('✦ App installed!'); hideStrip(); });
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

renderApp();
</script>
</body>
</html>
